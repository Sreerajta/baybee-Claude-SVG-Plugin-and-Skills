<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <g id="background">
    <rect x="0" y="0" width="1000" height="1000" fill="#f1f5f9" />
  </g>
  <g id="body">
    <!-- Body -->
    <ellipse cx="500" cy="550" rx="130" ry="100" fill="#38bdf8" stroke="#0f172a" stroke-width="5" />
    <!-- Left wing -->
    <path d="M 380,520 Q 280,460 300,380 Q 340,430 370,490" fill="#334155" stroke="#0f172a" stroke-width="5" stroke-linejoin="round" />
    <!-- Right wing -->
    <path d="M 620,520 Q 720,460 700,380 Q 660,430 630,490" fill="#334155" stroke="#0f172a" stroke-width="5" stroke-linejoin="round" />
    <!-- Tail feathers -->
    <path d="M 500,650 Q 460,730 420,760" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
    <path d="M 500,650 Q 500,740 500,770" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
    <path d="M 500,650 Q 540,730 580,760" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
  </g>
  <g id="head">
    <!-- Head -->
    <circle cx="500" cy="390" r="80" fill="#38bdf8" stroke="#0f172a" stroke-width="5" />
    <!-- Head highlight -->
    <circle cx="500" cy="390" r="60" fill="#38bdf8" stroke="none" />
  </g>
  <g id="face">
    <!-- Left eye -->
    <circle cx="470" cy="375" r="18" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <!-- Left pupil -->
    <circle cx="474" cy="378" r="9" fill="#0f172a" />
    <!-- Left eye glint -->
    <circle cx="478" cy="373" r="3" fill="#f1f5f9" />
    <!-- Right eye -->
    <circle cx="530" cy="375" r="18" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <!-- Right pupil -->
    <circle cx="526" cy="378" r="9" fill="#0f172a" />
    <!-- Right eye glint -->
    <circle cx="522" cy="373" r="3" fill="#f1f5f9" />
    <!-- Beak -->
    <polygon points="500,400 480,425 520,425" fill="#f59e0b" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />
    <!-- Beak line -->
    <line x1="485" y1="415" x2="515" y2="415" stroke="#0f172a" stroke-width="3" />
    <!-- Cheek left -->
    <circle cx="455" cy="405" r="12" fill="#f9a8d4" opacity="0.4" />
    <!-- Cheek right -->
    <circle cx="545" cy="405" r="12" fill="#f9a8d4" opacity="0.4" />
  </g>
  <g id="details">
    <!-- Left foot -->
    <path d="M 450,640 L 440,690 L 420,690" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" />
    <path d="M 440,690 L 450,700" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" />
    <path d="M 440,690 L 430,700" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" />
    <!-- Right foot -->
    <path d="M 550,640 L 560,690 L 580,690" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" />
    <path d="M 560,690 L 550,700" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" />
    <path d="M 560,690 L 570,700" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" />
    <!-- Belly -->
    <ellipse cx="500" cy="570" rx="70" ry="55" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" opacity="0.5" />
  </g>
  <g id="debug-overlay">
    <!-- Canvas boundary -->
    <rect x="0" y="0" width="1000" height="1000" fill="none" stroke="#ff0000" stroke-width="2" stroke-dasharray="10,10" />
    <!-- Center point -->
    <circle cx="500" cy="500" r="6" fill="#ff0000" />
    <line x1="490" y1="500" x2="510" y2="500" stroke="#ff0000" stroke-width="2" />
    <line x1="500" y1="490" x2="500" y2="510" stroke="#ff0000" stroke-width="2" />
    <!-- Grid lines vertical -->
    <line x1="100" y1="0" x2="100" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="200" y1="0" x2="200" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="300" y1="0" x2="300" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="400" y1="0" x2="400" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="500" y1="0" x2="500" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="600" y1="0" x2="600" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="700" y1="0" x2="700" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="800" y1="0" x2="800" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="900" y1="0" x2="900" y2="1000" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <!-- Grid lines horizontal -->
    <line x1="0" y1="100" x2="1000" y2="100" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="200" x2="1000" y2="200" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="300" x2="1000" y2="300" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="400" x2="1000" y2="400" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="500" x2="1000" y2="500" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="600" x2="1000" y2="600" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="700" x2="1000" y2="700" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="800" x2="1000" y2="800" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="0" y1="900" x2="1000" y2="900" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4" />
    <!-- Zone overlays -->
    <rect x="0" y="0" width="1000" height="300" fill="rgba(0,0,255,0.05)" />
    <rect x="0" y="300" width="1000" height="300" fill="rgba(0,255,0,0.05)" />
    <rect x="0" y="600" width="1000" height="400" fill="rgba(255,165,0,0.05)" />
    <!-- Zone labels -->
    <text x="20" y="30" font-size="16" fill="#ff00ff" font-family="sans-serif" opacity="0.7">sky (0-300)</text>
    <text x="20" y="330" font-size="16" fill="#ff00ff" font-family="sans-serif" opacity="0.7">mid (300-600)</text>
    <text x="20" y="630" font-size="16" fill="#ff00ff" font-family="sans-serif" opacity="0.7">ground (600-1000)</text>
    <!-- Bounding box: head -->
    <rect x="420" y="310" width="160" height="160" fill="none" stroke="#ff00ff" stroke-width="2" stroke-dasharray="6,6" />
    <text x="422" y="305" font-size="16" fill="#ff00ff" font-family="sans-serif">head</text>
    <!-- Bounding box: body -->
    <rect x="370" y="450" width="260" height="200" fill="none" stroke="#ff00ff" stroke-width="2" stroke-dasharray="6,6" />
    <text x="372" y="445" font-size="16" fill="#ff00ff" font-family="sans-serif">body</text>
    <!-- Bounding box: left wing -->
    <rect x="280" y="380" width="100" height="140" fill="none" stroke="#ff00ff" stroke-width="2" stroke-dasharray="6,6" />
    <text x="282" y="375" font-size="16" fill="#ff00ff" font-family="sans-serif">l-wing</text>
    <!-- Bounding box: right wing -->
    <rect x="620" y="380" width="100" height="140" fill="none" stroke="#ff00ff" stroke-width="2" stroke-dasharray="6,6" />
    <text x="622" y="375" font-size="16" fill="#ff00ff" font-family="sans-serif">r-wing</text>
    <!-- Bounding box: tail -->
    <rect x="420" y="650" width="160" height="120" fill="none" stroke="#ff00ff" stroke-width="2" stroke-dasharray="6,6" />
    <text x="422" y="645" font-size="16" fill="#ff00ff" font-family="sans-serif">tail</text>
    <!-- Bounding box: feet -->
    <rect x="415" y="640" width="170" height="65" fill="none" stroke="#ff00ff" stroke-width="2" stroke-dasharray="6,6" />
    <text x="417" y="635" font-size="16" fill="#ff00ff" font-family="sans-serif">feet</text>
  </g>
</svg>
