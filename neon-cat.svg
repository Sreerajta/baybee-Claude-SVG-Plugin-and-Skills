<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <g id="background">
    <rect x="0" y="0" width="1000" height="1000" fill="#0a0a1a" />
  </g>
  <g id="body">
    <!-- Body -->
    <ellipse cx="500" cy="620" rx="150" ry="180" fill="none" stroke="#00ffff" stroke-width="5" opacity="0.9" />
    <!-- Body glow -->
    <ellipse cx="500" cy="620" rx="155" ry="185" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.3" />
    <!-- Left front leg -->
    <rect x="400" y="750" width="30" height="90" rx="10" ry="10" fill="none" stroke="#00ffff" stroke-width="4" />
    <!-- Right front leg -->
    <rect x="560" y="750" width="30" height="90" rx="10" ry="10" fill="none" stroke="#00ffff" stroke-width="4" />
    <!-- Left back leg -->
    <rect x="370" y="740" width="35" height="80" rx="10" ry="10" fill="none" stroke="#ff00ff" stroke-width="4" opacity="0.7" />
    <!-- Right back leg -->
    <rect x="590" y="740" width="35" height="80" rx="10" ry="10" fill="none" stroke="#ff00ff" stroke-width="4" opacity="0.7" />
    <!-- Paws -->
    <ellipse cx="415" cy="840" rx="20" ry="10" fill="none" stroke="#00ffff" stroke-width="4" />
    <ellipse cx="575" cy="840" rx="20" ry="10" fill="none" stroke="#00ffff" stroke-width="4" />
    <ellipse cx="387" cy="820" rx="22" ry="10" fill="none" stroke="#ff00ff" stroke-width="3" opacity="0.7" />
    <ellipse cx="607" cy="820" rx="22" ry="10" fill="none" stroke="#ff00ff" stroke-width="3" opacity="0.7" />
    <!-- Tail -->
    <path d="M 355,600 Q 280,550 270,470 Q 265,420 300,400 Q 330,385 340,410" fill="none" stroke="#ff00ff" stroke-width="5" stroke-linecap="round" />
    <!-- Tail glow -->
    <path d="M 355,600 Q 280,550 270,470 Q 265,420 300,400 Q 330,385 340,410" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.3" />
  </g>
  <g id="head">
    <!-- Head -->
    <circle cx="500" cy="380" r="130" fill="none" stroke="#00ffff" stroke-width="5" />
    <!-- Head glow -->
    <circle cx="500" cy="380" r="135" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.3" />
    <!-- Left ear -->
    <polygon points="400,290 370,190 440,260" fill="none" stroke="#ff00ff" stroke-width="5" stroke-linejoin="round" />
    <!-- Left ear glow -->
    <polygon points="400,290 370,190 440,260" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.3" />
    <!-- Left inner ear -->
    <polygon points="405,280 385,215 432,262" fill="none" stroke="#00ff9f" stroke-width="3" opacity="0.6" />
    <!-- Right ear -->
    <polygon points="600,290 630,190 560,260" fill="none" stroke="#ff00ff" stroke-width="5" stroke-linejoin="round" />
    <!-- Right ear glow -->
    <polygon points="600,290 630,190 560,260" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.3" />
    <!-- Right inner ear -->
    <polygon points="595,280 615,215 568,262" fill="none" stroke="#00ff9f" stroke-width="3" opacity="0.6" />
  </g>
  <g id="face">
    <!-- Left eye -->
    <ellipse cx="450" cy="370" rx="30" ry="35" fill="none" stroke="#00ff9f" stroke-width="4" />
    <!-- Left eye glow -->
    <ellipse cx="450" cy="370" rx="34" ry="39" fill="none" stroke="#00ff9f" stroke-width="2" opacity="0.3" />
    <!-- Left pupil slit -->
    <line x1="450" y1="345" x2="450" y2="395" stroke="#00ff9f" stroke-width="4" stroke-linecap="round" />
    <!-- Right eye -->
    <ellipse cx="550" cy="370" rx="30" ry="35" fill="none" stroke="#00ff9f" stroke-width="4" />
    <!-- Right eye glow -->
    <ellipse cx="550" cy="370" rx="34" ry="39" fill="none" stroke="#00ff9f" stroke-width="2" opacity="0.3" />
    <!-- Right pupil slit -->
    <line x1="550" y1="345" x2="550" y2="395" stroke="#00ff9f" stroke-width="4" stroke-linecap="round" />
    <!-- Nose -->
    <polygon points="500,415 490,430 510,430" fill="#ff00ff" stroke="#ff00ff" stroke-width="3" opacity="0.9" />
    <!-- Mouth left -->
    <path d="M 500,430 Q 480,450 460,445" fill="none" stroke="#ff00ff" stroke-width="3" stroke-linecap="round" />
    <!-- Mouth right -->
    <path d="M 500,430 Q 520,450 540,445" fill="none" stroke="#ff00ff" stroke-width="3" stroke-linecap="round" />
  </g>
  <g id="details">
    <!-- Left whiskers -->
    <line x1="430" y1="430" x2="340" y2="415" stroke="#00ffff" stroke-width="2" opacity="0.7" />
    <line x1="430" y1="440" x2="335" y2="440" stroke="#00ffff" stroke-width="2" opacity="0.7" />
    <line x1="430" y1="450" x2="340" y2="465" stroke="#00ffff" stroke-width="2" opacity="0.7" />
    <!-- Right whiskers -->
    <line x1="570" y1="430" x2="660" y2="415" stroke="#00ffff" stroke-width="2" opacity="0.7" />
    <line x1="570" y1="440" x2="665" y2="440" stroke="#00ffff" stroke-width="2" opacity="0.7" />
    <line x1="570" y1="450" x2="660" y2="465" stroke="#00ffff" stroke-width="2" opacity="0.7" />
    <!-- Ground reflection line -->
    <line x1="300" y1="860" x2="700" y2="860" stroke="#00ffff" stroke-width="2" opacity="0.2" />
    <line x1="350" y1="870" x2="650" y2="870" stroke="#ff00ff" stroke-width="1" opacity="0.15" />
  </g>
  <g id="animation">
    <!-- Pulsing eye glow -->
    <ellipse cx="450" cy="370" rx="38" ry="43" fill="none" stroke="#00ff9f" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="2s" repeatCount="indefinite" />
      <animate attributeName="rx" values="38;44;38" dur="2s" repeatCount="indefinite" />
      <animate attributeName="ry" values="43;49;43" dur="2s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="550" cy="370" rx="38" ry="43" fill="none" stroke="#00ff9f" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="2s" repeatCount="indefinite" />
      <animate attributeName="rx" values="38;44;38" dur="2s" repeatCount="indefinite" />
      <animate attributeName="ry" values="43;49;43" dur="2s" repeatCount="indefinite" />
    </ellipse>
    <!-- Tail sway -->
    <path d="M 355,600 Q 280,550 270,470 Q 265,420 300,400 Q 330,385 340,410" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
