<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <g id="background">
    <!-- Water -->
    <rect x="0" y="0" width="1000" height="1000" fill="#0c4a6e" />
    <!-- Light rays from surface -->
    <polygon points="300,0 380,0 500,400 420,400" fill="#38bdf8" opacity="0.06" />
    <polygon points="550,0 620,0 680,350 610,350" fill="#38bdf8" opacity="0.05" />
    <polygon points="780,0 840,0 860,300 800,300" fill="#38bdf8" opacity="0.04" />
    <!-- Water surface shimmer -->
    <ellipse cx="200" cy="30" rx="150" ry="8" fill="#7dd3fc" opacity="0.15" />
    <ellipse cx="600" cy="20" rx="180" ry="6" fill="#7dd3fc" opacity="0.12" />
    <ellipse cx="900" cy="35" rx="100" ry="7" fill="#7dd3fc" opacity="0.1" />
  </g>
  <g id="environment">
    <!-- Seaweed left -->
    <path d="M 80,1000 Q 70,880 90,780 Q 110,700 85,620" fill="none" stroke="#166534" stroke-width="8" stroke-linecap="round" opacity="0.7">
      <animate attributeName="d" values="M 80,1000 Q 70,880 90,780 Q 110,700 85,620;M 80,1000 Q 95,880 80,780 Q 60,700 90,620;M 80,1000 Q 70,880 90,780 Q 110,700 85,620" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M 120,1000 Q 110,900 130,820 Q 150,750 125,680" fill="none" stroke="#15803d" stroke-width="6" stroke-linecap="round" opacity="0.6">
      <animate attributeName="d" values="M 120,1000 Q 110,900 130,820 Q 150,750 125,680;M 120,1000 Q 135,900 120,820 Q 100,750 130,680;M 120,1000 Q 110,900 130,820 Q 150,750 125,680" dur="5s" repeatCount="indefinite" />
    </path>
    <!-- Seaweed right -->
    <path d="M 880,1000 Q 870,890 895,800 Q 915,720 885,650" fill="none" stroke="#166534" stroke-width="7" stroke-linecap="round" opacity="0.7">
      <animate attributeName="d" values="M 880,1000 Q 870,890 895,800 Q 915,720 885,650;M 880,1000 Q 895,890 875,800 Q 855,720 890,650;M 880,1000 Q 870,890 895,800 Q 915,720 885,650" dur="4.5s" repeatCount="indefinite" />
    </path>
    <!-- Sandy floor -->
    <ellipse cx="500" cy="980" rx="500" ry="40" fill="#a3845b" opacity="0.3" />
    <!-- Small rocks -->
    <ellipse cx="200" cy="970" rx="25" ry="12" fill="#334155" opacity="0.4" />
    <ellipse cx="750" cy="975" rx="30" ry="10" fill="#334155" opacity="0.35" />
    <ellipse cx="500" cy="980" rx="18" ry="8" fill="#334155" opacity="0.3" />
  </g>
  <g id="characters">
    <!-- Whole fish group with swimming translate -->
    <g id="fish">
      <!-- Tail fin -->
      <g id="tail-fin">
        <polygon points="310,480 260,430 260,530" fill="#38bdf8" stroke="#0f172a" stroke-width="5" stroke-linejoin="round" />
        <line x1="285" y1="455" x2="300" y2="480" stroke="#0f172a" stroke-width="2" opacity="0.4" />
        <line x1="285" y1="505" x2="300" y2="480" stroke="#0f172a" stroke-width="2" opacity="0.4" />
        <animateTransform attributeName="transform" type="rotate"
          values="-12 310 480;12 310 480;-12 310 480"
          dur="0.6s" repeatCount="indefinite" />
      </g>

      <!-- Body -->
      <g id="fish-body">
        <ellipse cx="480" cy="480" rx="150" ry="80" fill="#38bdf8" stroke="#0f172a" stroke-width="5" />
        <!-- Scales pattern -->
        <ellipse cx="430" cy="460" rx="18" ry="14" fill="none" stroke="#0284c7" stroke-width="2" opacity="0.3" />
        <ellipse cx="465" cy="480" rx="18" ry="14" fill="none" stroke="#0284c7" stroke-width="2" opacity="0.3" />
        <ellipse cx="430" cy="500" rx="18" ry="14" fill="none" stroke="#0284c7" stroke-width="2" opacity="0.3" />
        <ellipse cx="500" cy="465" rx="18" ry="14" fill="none" stroke="#0284c7" stroke-width="2" opacity="0.3" />
        <ellipse cx="500" cy="498" rx="18" ry="14" fill="none" stroke="#0284c7" stroke-width="2" opacity="0.3" />
        <!-- Belly -->
        <ellipse cx="490" cy="510" rx="100" ry="35" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" opacity="0.4" />
        <!-- Lateral line -->
        <path d="M 350,480 Q 450,475 580,470" fill="none" stroke="#0f172a" stroke-width="2" opacity="0.3" />
      </g>

      <!-- Dorsal fin -->
      <g id="dorsal-fin">
        <path d="M 460,400 Q 480,340 520,370 Q 510,390 500,400" fill="#334155" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />
        <animateTransform attributeName="transform" type="rotate"
          values="-5 490 400;5 490 400;-5 490 400"
          dur="1.5s" repeatCount="indefinite" />
      </g>

      <!-- Bottom fin -->
      <g id="bottom-fin">
        <path d="M 460,560 Q 470,600 500,585 Q 495,570 490,560" fill="#334155" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />
        <animateTransform attributeName="transform" type="rotate"
          values="5 475 560;-5 475 560;5 475 560"
          dur="1.5s" repeatCount="indefinite" />
      </g>

      <!-- Side fin left -->
      <g id="side-fin">
        <path d="M 520,520 Q 540,570 570,555 Q 555,535 540,520" fill="#334155" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />
        <animateTransform attributeName="transform" type="rotate"
          values="8 520 520;-8 520 520;8 520 520"
          dur="1.2s" repeatCount="indefinite" />
      </g>

      <!-- Head/face -->
      <g id="fish-head">
        <!-- Eye -->
        <circle cx="580" cy="465" r="18" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
        <circle cx="584" cy="467" r="10" fill="#0f172a" />
        <circle cx="588" cy="463" r="4" fill="#f1f5f9" />
        <!-- Mouth -->
        <path d="M 625,485 Q 632,490 625,495" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
        <!-- Gill -->
        <path d="M 548,455 Q 542,475 548,495" fill="none" stroke="#0f172a" stroke-width="3" opacity="0.5" />
      </g>

      <!-- Swimming translate for whole fish -->
      <animateTransform attributeName="transform" type="translate"
        values="0 0;18 -5;0 0;-12 5;0 0"
        dur="3s" repeatCount="indefinite" />
    </g>
  </g>
  <g id="foreground">
    <!-- Bubbles -->
    <g id="bubbles">
      <circle cx="650" cy="420" r="6" fill="none" stroke="#f1f5f9" stroke-width="2" opacity="0.5">
        <animate attributeName="cy" values="420;350;280" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.5;0.3;0" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="640" cy="440" r="4" fill="none" stroke="#f1f5f9" stroke-width="2" opacity="0.4">
        <animate attributeName="cy" values="440;360;280" dur="3.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.4;0.2;0" dur="3.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="660" cy="435" r="5" fill="none" stroke="#f1f5f9" stroke-width="2" opacity="0.45">
        <animate attributeName="cy" values="435;370;300" dur="4s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.45;0.25;0" dur="4s" repeatCount="indefinite" />
      </circle>
      <circle cx="635" cy="400" r="3" fill="none" stroke="#f1f5f9" stroke-width="1.5" opacity="0.35">
        <animate attributeName="cy" values="400;320;240" dur="4.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.35;0.15;0" dur="4.5s" repeatCount="indefinite" />
      </circle>
    </g>
    <!-- Floating particles -->
    <circle cx="200" cy="300" r="2" fill="#f1f5f9" opacity="0.15">
      <animate attributeName="cy" values="300;280;300" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="600" r="2" fill="#f1f5f9" opacity="0.12">
      <animate attributeName="cy" values="600;580;600" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="350" cy="750" r="1.5" fill="#f1f5f9" opacity="0.1">
      <animate attributeName="cy" values="750;730;750" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
