<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6CB4D9"/>
      <stop offset="100%" stop-color="#C8E0ED"/>
    </linearGradient>
    <linearGradient id="gnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8CC152"/>
      <stop offset="100%" stop-color="#5A8630"/>
    </linearGradient>
  </defs>

  <!-- ========== LAYER 1: BACKGROUND ========== -->
  <g id="background">
    <!-- Sky -->
    <rect width="1000" height="1000" fill="url(#sky)"/>

    <!-- Sun — top-right sky zone -->
    <circle cx="830" cy="130" r="48" fill="#F5D76E" opacity="0.9"/>

    <!-- Clouds — sky zone, varied sizes, spread across -->
    <g id="cloud-1" opacity="0.6">
      <ellipse cx="160" cy="108" rx="62" ry="22" fill="#fff"/>
      <ellipse cx="210" cy="98" rx="44" ry="18" fill="#fff"/>
      <ellipse cx="120" cy="102" rx="36" ry="16" fill="#fff"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;20,0;0,0" dur="26s" repeatCount="indefinite"/>
    </g>
    <g id="cloud-2" opacity="0.45">
      <ellipse cx="580" cy="80" rx="48" ry="18" fill="#fff"/>
      <ellipse cx="618" cy="74" rx="34" ry="14" fill="#fff"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-12,0;0,0" dur="30s" repeatCount="indefinite"/>
    </g>
    <g id="cloud-3" opacity="0.35">
      <ellipse cx="400" cy="155" rx="38" ry="14" fill="#fff"/>
      <ellipse cx="430" cy="150" rx="28" ry="12" fill="#fff"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;10,0;0,0" dur="22s" repeatCount="indefinite"/>
    </g>

    <!-- Mountains — distant, behind everything -->
    <polygon points="0,620 80,510 160,600 240,530 340,590 420,540 500,600 580,520 680,580 760,500 860,570 940,525 1000,580 1000,650 0,650" fill="#88B84A" opacity="0.3"/>
    <polygon points="0,640 120,580 220,620 350,570 450,615 550,560 650,610 780,555 880,600 1000,570 1000,650 0,650" fill="#7AAD3E" opacity="0.25"/>
  </g>

  <!-- ========== LAYER 2: ENVIRONMENT ========== -->
  <g id="environment">
    <!-- Ground -->
    <rect x="0" y="640" width="1000" height="360" fill="url(#gnd)"/>

    <!-- Ground texture dots -->
    <g opacity="0.15">
      <circle cx="120" cy="680" r="3" fill="#4A8628"/>
      <circle cx="310" cy="700" r="2.5" fill="#4A8628"/>
      <circle cx="520" cy="690" r="3" fill="#4A8628"/>
      <circle cx="680" cy="675" r="2" fill="#4A8628"/>
      <circle cx="850" cy="695" r="2.5" fill="#4A8628"/>
      <circle cx="440" cy="710" r="3" fill="#4A8628"/>
      <circle cx="750" cy="715" r="2" fill="#4A8628"/>
    </g>

    <!-- Distant trees — small, far back, spread across horizon -->
    <g id="trees-distant" opacity="0.45">
      <rect x="78" y="602" width="7" height="36" fill="#6B4E2A"/>
      <polygon points="62,606 82,548 102,606" fill="#5A9E30"/>

      <rect x="168" y="596" width="6" height="40" fill="#6B4E2A"/>
      <polygon points="154,600 171,535 188,600" fill="#4E8C28"/>

      <rect x="848" y="600" width="7" height="38" fill="#6B4E2A"/>
      <polygon points="832,604 852,545 872,604" fill="#5A9E30"/>

      <rect x="938" y="596" width="6" height="40" fill="#6B4E2A"/>
      <polygon points="924,600 941,538 958,600" fill="#4E8C28"/>
    </g>

    <!-- Mid-ground trees — larger, flanking the horse area for balance -->
    <g id="trees-mid">
      <!-- Left tree — taller, balances horse on right-center -->
      <rect x="108" y="580" width="12" height="62" fill="#5C3D1A"/>
      <polygon points="78,586 114,490 150,586" fill="#4E8C28"/>
      <polygon points="85,545 114,465 143,545" fill="#5A9E30"/>

      <!-- Right tree cluster -->
      <rect x="858" y="582" width="11" height="60" fill="#5C3D1A"/>
      <polygon points="830,588 863,496 896,588" fill="#4E8C28"/>
      <polygon points="838,548 863,472 888,548" fill="#5A9E30"/>

      <rect x="918" y="588" width="10" height="54" fill="#5C3D1A"/>
      <polygon points="894,594 923,510 952,594" fill="#4E8C28"/>
    </g>

    <!-- Rocks — scattered on ground, natural placement -->
    <polygon points="140,660 155,648 170,654 168,664 142,664" fill="#8C8C78" opacity="0.4"/>
    <polygon points="770,658 782,648 794,655 790,662 772,662" fill="#8C8C78" opacity="0.35"/>
    <polygon points="660,665 668,656 678,660 676,668 662,668" fill="#8C8C78" opacity="0.3"/>
    <polygon points="290,662 298,654 308,658 306,666 292,666" fill="#8C8C78" opacity="0.3"/>

    <!-- Ground-level flowers — behind subject -->
    <g id="flowers-ground">
      <circle cx="100" cy="668" r="4" fill="#F5D76E"/>
      <circle cx="100" cy="668" r="2" fill="#FFE98A"/>

      <circle cx="240" cy="676" r="3.5" fill="#E88D67"/>
      <circle cx="240" cy="676" r="1.8" fill="#FFB89A"/>

      <circle cx="650" cy="665" r="4" fill="#F5D76E"/>
      <circle cx="650" cy="665" r="2" fill="#FFE98A"/>

      <circle cx="820" cy="670" r="3.5" fill="#E88D67"/>
      <circle cx="820" cy="670" r="1.8" fill="#FFB89A"/>

      <circle cx="920" cy="660" r="3" fill="#CE93D8"/>
      <circle cx="920" cy="660" r="1.5" fill="#E8C0EE"/>
    </g>
  </g>

  <!-- ========== LAYER 3: SUBJECT ========== -->
  <g id="horse-1">
    <!-- Tail -->
    <g id="horse-1-tail">
      <polygon points="340,395 312,342 328,336 352,390" fill="#1E1E1E"/>
      <polygon points="316,346 298,305 313,298 332,340" fill="#2A2218"/>
      <animateTransform attributeName="transform" type="rotate" values="0 345 395;-4 345 395;0 345 395;3 345 395;0 345 395" dur="3.5s" repeatCount="indefinite"/>
    </g>

    <!-- Far legs -->
    <rect x="395" y="510" width="24" height="140" rx="3" fill="#9B6830"/>
    <rect x="555" y="505" width="24" height="145" rx="3" fill="#9B6830"/>
    <rect x="392" y="645" width="30" height="16" rx="3" fill="#1E1E1E"/>
    <rect x="552" y="645" width="30" height="16" rx="3" fill="#1E1E1E"/>

    <!-- Body -->
    <rect id="horse-1-body" x="350" y="410" width="250" height="110" rx="20" fill="#C8863A"/>
    <rect x="360" y="490" width="230" height="25" rx="10" fill="#A06E28" opacity="0.3"/>

    <!-- Near legs -->
    <rect x="410" y="510" width="26" height="140" rx="3" fill="#C8863A"/>
    <rect x="570" y="505" width="26" height="145" rx="3" fill="#C8863A"/>
    <rect x="407" y="645" width="32" height="18" rx="3" fill="#1E1E1E"/>
    <rect x="567" y="645" width="32" height="18" rx="3" fill="#1E1E1E"/>

    <!-- Neck -->
    <polygon id="horse-1-neck" points="580,420 620,330 660,330 610,430" fill="#C8863A"/>
    <polygon points="600,425 615,365 625,365 612,430" fill="#A06E28" opacity="0.2"/>

    <!-- Head -->
    <g id="horse-1-head">
      <rect x="625" y="310" width="80" height="45" rx="10" fill="#C8863A"/>
      <rect x="695" y="322" width="35" height="28" rx="8" fill="#DAA545"/>
      <polygon points="640,310 650,280 660,310" fill="#C8863A"/>
      <polygon points="644,308 650,286 656,308" fill="#DAA545" opacity="0.5"/>
      <circle cx="660" cy="330" r="5" fill="#1E1E1E"/>
      <circle cx="661.5" cy="328.5" r="1.8" fill="#fff"/>
      <circle cx="722" cy="340" r="3.5" fill="#6B4E0A"/>
    </g>

    <!-- Mane -->
    <g id="horse-1-mane">
      <polygon points="620,332 628,310 636,332" fill="#1E1E1E"/>
      <polygon points="610,348 618,326 626,348" fill="#1E1E1E"/>
      <polygon points="600,365 608,343 616,365" fill="#1E1E1E"/>
      <polygon points="590,382 598,360 606,382" fill="#1E1E1E"/>
      <polygon points="580,398 588,376 596,398" fill="#1E1E1E"/>
      <polygon points="642,310 648,288 654,310" fill="#1E1E1E"/>
    </g>
  </g>

  <!-- ========== LAYER 4: FOREGROUND ========== -->
  <g id="foreground">

    <!-- Grass near horse — medium size, around hooves -->
    <g>
      <path d="M370,670 Q365,650 372,632" fill="none" stroke="#4CAF50" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M382,672 Q388,652 384,634" fill="none" stroke="#66BB6A" stroke-width="3" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="-1 376 670;2 376 670;-1 376 670" dur="2.6s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M550,668 Q545,648 552,630" fill="none" stroke="#66BB6A" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M562,670 Q568,652 564,634" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="1 556 668;-1 556 668;1 556 668" dur="3s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M462,672 Q458,654 464,638" fill="none" stroke="#5BA035" stroke-width="3" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="-1 464 672;1 464 672;-1 464 672" dur="3.2s" repeatCount="indefinite"/>
    </g>

    <!-- Mid-field flowers — larger, in front of horse -->
    <g>
      <circle cx="480" cy="700" r="4.5" fill="#CE93D8"/>
      <circle cx="480" cy="700" r="2.2" fill="#E8C0EE"/>
    </g>
    <g>
      <circle cx="160" cy="720" r="5" fill="#F5D76E"/>
      <circle cx="160" cy="720" r="2.5" fill="#FFE98A"/>
    </g>
    <g>
      <circle cx="700" cy="710" r="4.5" fill="#E88D67"/>
      <circle cx="700" cy="710" r="2.2" fill="#FFB89A"/>
    </g>
    <g>
      <circle cx="880" cy="730" r="5" fill="#CE93D8"/>
      <circle cx="880" cy="730" r="2.5" fill="#E8C0EE"/>
    </g>

    <!-- Foreground grass — large, closest to viewer, full spread -->
    <g>
      <path d="M40,985 Q30,940 48,900" fill="none" stroke="#4CAF50" stroke-width="5" stroke-linecap="round"/>
      <path d="M56,985 Q66,945 58,905" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>
      <path d="M72,985 Q80,948 88,910" fill="none" stroke="#43A047" stroke-width="4.5" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="-2 56 985;2 56 985;-2 56 985" dur="2.8s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M180,975 Q172,935 186,900" fill="none" stroke="#66BB6A" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M196,978 Q204,942 198,906" fill="none" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="1 188 975;-3 188 975;1 188 975" dur="3.1s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M340,980 Q332,942 344,908" fill="none" stroke="#4CAF50" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M354,982 Q362,946 356,912" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>
      <path d="M368,980 Q374,948 380,914" fill="none" stroke="#43A047" stroke-width="4" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="-1 354 980;2 354 980;-1 354 980" dur="2.5s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M520,978 Q514,940 524,908" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>
      <path d="M534,980 Q540,944 536,910" fill="none" stroke="#4CAF50" stroke-width="3.5" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="1 527 978;-2 527 978;1 527 978" dur="2.9s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M680,975 Q674,938 684,906" fill="none" stroke="#4CAF50" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M694,978 Q700,942 696,908" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="-2 687 975;2 687 975;-2 687 975" dur="3s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M830,980 Q822,942 834,908" fill="none" stroke="#66BB6A" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M844,982 Q852,946 846,912" fill="none" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
      <path d="M858,980 Q864,948 870,914" fill="none" stroke="#43A047" stroke-width="4" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="1 844 980;-2 844 980;1 844 980" dur="2.6s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M950,976 Q944,940 954,910" fill="none" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
      <path d="M962,978 Q968,944 964,912" fill="none" stroke="#66BB6A" stroke-width="3.5" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="-1 956 976;2 956 976;-1 956 976" dur="3.2s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>