<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <g id="background">
    <rect x="0" y="0" width="1000" height="1000" fill="#f1f5f9" />
    <!-- Ground -->
    <rect x="0" y="750" width="1000" height="250" fill="#e2e8f0" />
    <line x1="0" y1="750" x2="1000" y2="750" stroke="#334155" stroke-width="2" opacity="0.3" />
  </g>
  <g id="character">
    <!-- Tail -->
    <g id="tail">
      <path d="M 340,480 Q 290,440 270,380 Q 260,350 280,330" fill="none" stroke="#a16207" stroke-width="14" stroke-linecap="round" />
      <!-- Tail tip fluff -->
      <ellipse cx="280" cy="325" rx="14" ry="10" fill="#ca8a04" stroke="#0f172a" stroke-width="3" />
      <animateTransform attributeName="transform" type="rotate"
        values="-18 340 480;22 340 480;-18 340 480"
        dur="0.5s" repeatCount="indefinite" />
    </g>

    <!-- Back legs -->
    <g id="back-legs">
      <!-- Back left leg -->
      <rect x="380" y="640" width="40" height="100" rx="14" ry="14" fill="#ca8a04" stroke="#0f172a" stroke-width="5" />
      <!-- Back left paw -->
      <ellipse cx="400" cy="745" rx="24" ry="12" fill="#a16207" stroke="#0f172a" stroke-width="4" />
      <!-- Back right leg -->
      <rect x="440" y="645" width="40" height="95" rx="14" ry="14" fill="#ca8a04" stroke="#0f172a" stroke-width="5" />
      <!-- Back right paw -->
      <ellipse cx="460" cy="745" rx="24" ry="12" fill="#a16207" stroke="#0f172a" stroke-width="4" />
    </g>

    <!-- Body -->
    <g id="body">
      <ellipse cx="500" cy="530" rx="170" ry="120" fill="#ca8a04" stroke="#0f172a" stroke-width="6" />
      <!-- Belly -->
      <ellipse cx="520" cy="570" rx="100" ry="60" fill="#fbbf24" stroke="#0f172a" stroke-width="3" opacity="0.5" />
      <!-- Breathing -->
      <animateTransform attributeName="transform" type="scale"
        values="1;1.02;1"
        dur="3s" repeatCount="indefinite" />
    </g>

    <!-- Front legs -->
    <g id="front-legs">
      <!-- Front left leg -->
      <rect x="570" y="630" width="42" height="110" rx="14" ry="14" fill="#ca8a04" stroke="#0f172a" stroke-width="5" />
      <!-- Front left paw -->
      <ellipse cx="591" cy="745" rx="26" ry="13" fill="#a16207" stroke="#0f172a" stroke-width="4" />
      <!-- Front right leg -->
      <rect x="630" y="635" width="42" height="105" rx="14" ry="14" fill="#ca8a04" stroke="#0f172a" stroke-width="5" />
      <!-- Front right paw -->
      <ellipse cx="651" cy="745" rx="26" ry="13" fill="#a16207" stroke="#0f172a" stroke-width="4" />
    </g>

    <!-- Collar -->
    <ellipse cx="620" cy="480" rx="55" ry="20" fill="#dc2626" stroke="#0f172a" stroke-width="4" transform="rotate(-10, 620, 480)" />
    <!-- Collar tag -->
    <circle cx="625" cy="500" r="8" fill="#fbbf24" stroke="#0f172a" stroke-width="2" />

    <!-- Head -->
    <g id="head">
      <circle cx="680" cy="400" r="95" fill="#ca8a04" stroke="#0f172a" stroke-width="6" />
      <!-- Snout -->
      <ellipse cx="740" cy="430" rx="55" ry="38" fill="#fbbf24" stroke="#0f172a" stroke-width="5" />
      <!-- Nose -->
      <ellipse cx="768" cy="418" rx="18" ry="14" fill="#0f172a" />
      <!-- Nose shine -->
      <ellipse cx="772" cy="414" rx="5" ry="4" fill="#334155" />
      <!-- Mouth -->
      <path d="M 745,440 Q 755,458 770,445" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
      <!-- Tongue -->
      <g id="tongue">
        <ellipse cx="758" cy="462" rx="12" ry="18" fill="#f87171" stroke="#0f172a" stroke-width="3" />
        <line x1="758" y1="448" x2="758" y2="475" stroke="#dc2626" stroke-width="2" />
        <!-- Tongue bounce -->
        <animateTransform attributeName="transform" type="translate"
          values="0 0;0 3;0 0"
          dur="0.5s" repeatCount="indefinite" />
      </g>
      <!-- Left eye -->
      <circle cx="650" cy="385" r="16" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
      <circle cx="654" cy="387" r="9" fill="#78350f" />
      <circle cx="657" cy="383" r="3.5" fill="#f1f5f9" />
      <!-- Right eye -->
      <circle cx="710" cy="380" r="16" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
      <circle cx="714" cy="382" r="9" fill="#78350f" />
      <circle cx="717" cy="378" r="3.5" fill="#f1f5f9" />
      <!-- Eyebrows -->
      <path d="M 636,370 Q 645,362 660,368" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
      <path d="M 700,365 Q 710,358 724,363" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
      <!-- Left ear (floppy) -->
      <g id="left-ear">
        <ellipse cx="610" cy="340" rx="35" ry="55" fill="#a16207" stroke="#0f172a" stroke-width="5" transform="rotate(20, 610, 340)" />
        <ellipse cx="610" cy="345" rx="20" ry="35" fill="#ca8a04" stroke="none" transform="rotate(20, 610, 345)" />
        <!-- Ear flop secondary motion -->
        <animateTransform attributeName="transform" type="rotate"
          values="-3 630 310;3 630 310;-3 630 310"
          dur="0.6s" repeatCount="indefinite" />
      </g>
      <!-- Right ear (floppy) -->
      <g id="right-ear">
        <ellipse cx="730" cy="335" rx="35" ry="50" fill="#a16207" stroke="#0f172a" stroke-width="5" transform="rotate(-15, 730, 335)" />
        <ellipse cx="730" cy="340" rx="20" ry="32" fill="#ca8a04" stroke="none" transform="rotate(-15, 730, 340)" />
        <!-- Ear flop secondary motion -->
        <animateTransform attributeName="transform" type="rotate"
          values="3 720 310;-3 720 310;3 720 310"
          dur="0.65s" repeatCount="indefinite" />
      </g>
      <!-- Head happy tilt -->
      <animateTransform attributeName="transform" type="rotate"
        values="-3 680 400;3 680 400;-3 680 400"
        dur="0.5s" repeatCount="indefinite" />
    </g>

    <!-- Whole body happy bounce -->
    <animateTransform attributeName="transform" type="translate"
      values="0 0;0 -6;0 0"
      dur="0.5s" repeatCount="indefinite" />
  </g>
</svg>
