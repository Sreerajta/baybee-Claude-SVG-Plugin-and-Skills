<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="35%" stop-color="#ffab40"/>
      <stop offset="65%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="40%" stop-color="#ffee5840"/>
      <stop offset="100%" stop-color="#ffee5800"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e3a"/>
      <stop offset="100%" stop-color="#6b4f2a"/>
    </linearGradient>
    <radialGradient id="fox-body" cx="45%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ff8a40"/>
      <stop offset="100%" stop-color="#e05a10"/>
    </radialGradient>
    <radialGradient id="fox-chest" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#ffe0b0"/>
    </radialGradient>
    <radialGradient id="fox-head" cx="48%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#ff9040"/>
      <stop offset="100%" stop-color="#d85a15"/>
    </radialGradient>
    <radialGradient id="fox-face" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#ffe0c0"/>
    </radialGradient>
    <radialGradient id="trunk" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7a5a30"/>
      <stop offset="100%" stop-color="#4a3018"/>
    </radialGradient>
    <radialGradient id="leaf-orange" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff9040"/>
      <stop offset="100%" stop-color="#e06010"/>
    </radialGradient>
    <radialGradient id="leaf-red" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e05030"/>
      <stop offset="100%" stop-color="#b03018"/>
    </radialGradient>
    <radialGradient id="leaf-gold" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffc040"/>
      <stop offset="100%" stop-color="#d09020"/>
    </radialGradient>
    <radialGradient id="leaf-brown" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c07830"/>
      <stop offset="100%" stop-color="#905020"/>
    </radialGradient>
    <radialGradient id="cheek-blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8060"/>
      <stop offset="100%" stop-color="#ff806000"/>
    </radialGradient>
  </defs>

  <!-- Sunset sky -->
  <rect width="1000" height="1000" fill="url(#sky)"/>

  <!-- Sun low on horizon -->
  <circle cx="780" cy="340" r="150" fill="url(#sun)"/>
  <circle cx="780" cy="340" r="55" fill="#fff9c4"/>

  <!-- Distant hills -->
  <ellipse cx="300" cy="520" rx="400" ry="80" fill="#b07840" opacity="0.4"/>
  <ellipse cx="750" cy="530" rx="350" ry="70" fill="#a06830" opacity="0.3"/>

  <!-- Ground -->
  <rect x="0" y="530" width="1000" height="470" fill="url(#ground)"/>
  <ellipse cx="500" cy="540" rx="520" ry="22" fill="#9a7a48"/>

  <!-- Fallen leaves scattered on ground -->
  <g>
    <ellipse cx="120" cy="580" rx="8" ry="4" fill="#e06020" opacity="0.6" transform="rotate(-20,120,580)"/>
    <ellipse cx="300" cy="600" rx="7" ry="3.5" fill="#d09020" opacity="0.5" transform="rotate(15,300,600)"/>
    <ellipse cx="480" cy="620" rx="6" ry="3" fill="#c04818" opacity="0.5" transform="rotate(-30,480,620)"/>
    <ellipse cx="650" cy="590" rx="8" ry="4" fill="#ffa030" opacity="0.6" transform="rotate(10,650,590)"/>
    <ellipse cx="800" cy="610" rx="7" ry="3" fill="#e06020" opacity="0.5" transform="rotate(-15,800,610)"/>
    <ellipse cx="200" cy="640" rx="6" ry="3" fill="#c07828" opacity="0.4" transform="rotate(25,200,640)"/>
    <ellipse cx="550" cy="570" rx="7" ry="3.5" fill="#d09020" opacity="0.5" transform="rotate(-10,550,570)"/>
    <ellipse cx="880" cy="575" rx="6" ry="3" fill="#e06020" opacity="0.6" transform="rotate(20,880,575)"/>
  </g>

  <!-- === TREES === -->
  <!-- Tree 1 - left, large -->
  <g id="tree-1" transform="translate(130, 250)">
    <rect x="-18" y="60" width="36" height="230" fill="url(#trunk)" rx="6"/>
    <!-- Branches -->
    <line x1="-10" y1="120" x2="-60" y2="80" stroke="#5a3818" stroke-width="6" stroke-linecap="round"/>
    <line x1="12" y1="100" x2="55" y2="55" stroke="#5a3818" stroke-width="5" stroke-linecap="round"/>
    <line x1="-8" y1="160" x2="-50" y2="140" stroke="#5a3818" stroke-width="4" stroke-linecap="round"/>
    <!-- Canopy clusters -->
    <ellipse cx="-60" cy="55" rx="50" ry="42" fill="url(#leaf-red)"/>
    <ellipse cx="-30" cy="30" rx="45" ry="38" fill="url(#leaf-orange)"/>
    <ellipse cx="20" cy="20" rx="50" ry="40" fill="url(#leaf-gold)"/>
    <ellipse cx="55" cy="40" rx="40" ry="35" fill="url(#leaf-orange)"/>
    <ellipse cx="0" cy="55" rx="55" ry="35" fill="url(#leaf-red)"/>
    <ellipse cx="-45" cy="75" rx="35" ry="28" fill="url(#leaf-brown)"/>
    <ellipse cx="40" cy="70" rx="30" ry="25" fill="url(#leaf-gold)"/>
  </g>

  <!-- Tree 2 - right background -->
  <g id="tree-2" transform="translate(820, 280)" opacity="0.7">
    <rect x="-14" y="50" width="28" height="210" fill="url(#trunk)" rx="5"/>
    <line x1="-6" y1="100" x2="-40" y2="70" stroke="#5a3818" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="85" x2="38" y2="55" stroke="#5a3818" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="-35" cy="50" rx="40" ry="35" fill="url(#leaf-gold)"/>
    <ellipse cx="0" cy="25" rx="42" ry="35" fill="url(#leaf-orange)"/>
    <ellipse cx="35" cy="40" rx="38" ry="32" fill="url(#leaf-red)"/>
    <ellipse cx="0" cy="55" rx="45" ry="28" fill="url(#leaf-brown)"/>
  </g>

  <!-- Tree 3 - far right, small -->
  <g id="tree-3" transform="translate(950, 340)" opacity="0.5">
    <rect x="-10" y="30" width="20" height="170" fill="url(#trunk)" rx="4"/>
    <ellipse cx="0" cy="15" rx="35" ry="30" fill="url(#leaf-red)"/>
    <ellipse cx="-15" cy="35" rx="25" ry="22" fill="url(#leaf-gold)"/>
    <ellipse cx="18" cy="30" rx="22" ry="20" fill="url(#leaf-orange)"/>
  </g>

  <!-- Falling leaves (animated) -->
  <g>
    <ellipse cx="250" cy="200" rx="6" ry="3" fill="#e06020" opacity="0.7">
      <animate attributeName="cy" values="200;700" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="250;290" dur="8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0,250,200;360,290,700" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="400" cy="150" rx="5" ry="2.5" fill="#ffa030" opacity="0.6">
      <animate attributeName="cy" values="150;720" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="400;430" dur="10s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0,400,150;-360,430,720" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="600" cy="180" rx="5" ry="3" fill="#c04818" opacity="0.7">
      <animate attributeName="cy" values="180;680" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="600;580" dur="7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0,600,180;270,580,680" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="700" cy="100" rx="6" ry="3" fill="#d09020" opacity="0.6">
      <animate attributeName="cy" values="100;750" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="700;740" dur="12s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0,700,100;-300,740,750" dur="12s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="150" cy="280" rx="5" ry="2.5" fill="#e06020" opacity="0.5">
      <animate attributeName="cy" values="280;730" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="150;180" dur="9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0,150,280;320,180,730" dur="9s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- === FOX === -->
  <g id="fox" transform="translate(480, 560)">
    <!-- Tail (big, fluffy) -->
    <path d="M60,-10 Q120,-30 140,-60 Q155,-85 135,-95 Q115,-90 110,-70 Q105,-50 80,-20" fill="url(#fox-body)"/>
    <path d="M120,-70 Q130,-82 125,-90 Q118,-85 115,-72" fill="#fff8e8" opacity="0.6"/>

    <!-- Back legs -->
    <rect x="30" y="30" width="18" height="50" fill="#d85a15" rx="6"/>
    <rect x="50" y="28" width="18" height="48" fill="#e06818" rx="6"/>
    <ellipse cx="39" cy="82" rx="12" ry="6" fill="#2a1a0a"/>
    <ellipse cx="59" cy="80" rx="12" ry="6" fill="#2a1a0a"/>

    <!-- Body -->
    <ellipse cx="0" cy="0" rx="70" ry="48" fill="url(#fox-body)"/>

    <!-- Chest/belly -->
    <ellipse cx="-20" cy="12" rx="38" ry="32" fill="url(#fox-chest)"/>

    <!-- Front legs -->
    <rect x="-60" y="25" width="16" height="55" fill="#e06818" rx="6"/>
    <rect x="-42" y="28" width="16" height="52" fill="#d85a15" rx="6"/>
    <ellipse cx="-52" cy="82" rx="11" ry="6" fill="#2a1a0a"/>
    <ellipse cx="-34" cy="82" rx="11" ry="6" fill="#2a1a0a"/>

    <!-- Neck -->
    <ellipse cx="-50" cy="-30" rx="28" ry="35" fill="url(#fox-body)"/>
    <!-- Neck chest fur -->
    <ellipse cx="-48" cy="-15" rx="18" ry="22" fill="url(#fox-chest)"/>

    <!-- Head -->
    <ellipse cx="-60" cy="-70" rx="40" ry="35" fill="url(#fox-head)"/>

    <!-- Face mask (white) -->
    <ellipse cx="-65" cy="-62" rx="25" ry="22" fill="url(#fox-face)"/>

    <!-- Ears -->
    <polygon points="-88,-100 -80,-140 -65,-102" fill="#e06818"/>
    <polygon points="-85,-104 -80,-132 -69,-105" fill="#fff0d8"/>
    <polygon points="-42,-102 -45,-142 -58,-105" fill="#e06818"/>
    <polygon points="-45,-105 -46,-133 -55,-107" fill="#fff0d8"/>
    <!-- Ear tips dark -->
    <polygon points="-82,-130 -80,-140 -74,-128" fill="#2a1a0a"/>
    <polygon points="-48,-130 -45,-142 -52,-130" fill="#2a1a0a"/>

    <!-- Eyes -->
    <ellipse cx="-75" cy="-72" rx="8" ry="9" fill="white"/>
    <ellipse cx="-76" cy="-71" rx="5.5" ry="6.5" fill="#5a4020"/>
    <circle cx="-78" cy="-73" r="2.5" fill="#2a1a0a"/>
    <circle cx="-76" cy="-75" r="2" fill="white"/>
    <ellipse cx="-50" cy="-72" rx="8" ry="9" fill="white"/>
    <ellipse cx="-51" cy="-71" rx="5.5" ry="6.5" fill="#5a4020"/>
    <circle cx="-53" cy="-73" r="2.5" fill="#2a1a0a"/>
    <circle cx="-51" cy="-75" r="2" fill="white"/>

    <!-- Nose -->
    <ellipse cx="-65" cy="-58" rx="5" ry="4" fill="#2a1a0a"/>
    <!-- Nose shine -->
    <ellipse cx="-66" cy="-59" rx="2" ry="1.5" fill="#4a3a2a" opacity="0.5"/>

    <!-- Mouth -->
    <path d="M-65,-54 Q-68,-50 -72,-52" stroke="#4a2a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M-65,-54 Q-62,-50 -58,-52" stroke="#4a2a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="-88" y1="-62" x2="-110" y2="-68" stroke="#d0a060" stroke-width="0.8" opacity="0.5"/>
    <line x1="-88" y1="-58" x2="-112" y2="-56" stroke="#d0a060" stroke-width="0.8" opacity="0.5"/>
    <line x1="-88" y1="-54" x2="-108" y2="-48" stroke="#d0a060" stroke-width="0.8" opacity="0.5"/>
    <line x1="-42" y1="-62" x2="-22" y2="-66" stroke="#d0a060" stroke-width="0.8" opacity="0.5"/>
    <line x1="-42" y1="-58" x2="-20" y2="-56" stroke="#d0a060" stroke-width="0.8" opacity="0.5"/>
    <line x1="-42" y1="-54" x2="-22" y2="-48" stroke="#d0a060" stroke-width="0.8" opacity="0.5"/>

    <!-- Cheeks -->
    <circle cx="-85" cy="-58" r="7" fill="url(#cheek-blush)"/>
    <circle cx="-44" cy="-58" r="7" fill="url(#cheek-blush)"/>

    <!-- Dark paw tips -->
    <rect x="-60" y="70" width="16" height="12" fill="#2a1a0a" rx="5"/>
    <rect x="-42" y="72" width="16" height="10" fill="#2a1a0a" rx="5"/>
  </g>

  <!-- Mushrooms near fox -->
  <g transform="translate(350, 585)">
    <rect x="-2" y="0" width="5" height="14" fill="#e8d8c0" rx="2"/>
    <ellipse cx="1" cy="0" rx="10" ry="6" fill="#c04030"/>
    <circle cx="-3" cy="-2" r="2" fill="#f0e0d0" opacity="0.6"/>
    <circle cx="5" cy="0" r="1.5" fill="#f0e0d0" opacity="0.5"/>
  </g>
  <g transform="translate(365, 590)">
    <rect x="-1.5" y="0" width="4" height="10" fill="#e8d8c0" rx="1.5"/>
    <ellipse cx="0.5" cy="0" rx="7" ry="5" fill="#d05040"/>
    <circle cx="-2" cy="-1" r="1.5" fill="#f0e0d0" opacity="0.5"/>
  </g>

  <!-- Birds in sky -->
  <g stroke="#6a3a1a" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M500,180 Q505,174 510,180 Q515,174 520,180"/>
    <path d="M540,160 Q544,155 548,160 Q552,155 556,160"/>
    <path d="M460,200 Q464,195 468,200 Q472,195 476,200"/>
  </g>

  <!-- Warm clouds -->
  <g opacity="0.35">
    <ellipse cx="350" cy="100" rx="70" ry="22" fill="#ffc0a0"/>
    <ellipse cx="320" cy="95" rx="40" ry="16" fill="#ffd0b0"/>
    <ellipse cx="390" cy="97" rx="35" ry="14" fill="#ffc0a0"/>
  </g>
  <g opacity="0.25">
    <ellipse cx="600" cy="140" rx="55" ry="18" fill="#ffc0a0"/>
    <ellipse cx="630" cy="136" rx="30" ry="14" fill="#ffd0b0"/>
  </g>
</svg>
