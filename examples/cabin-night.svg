<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="night-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="50%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#2a3a5e"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f5d8"/>
      <stop offset="35%" stop-color="#e8e8c0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e8e8c0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground-snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8e4f0"/>
      <stop offset="100%" stop-color="#b8c8d8"/>
    </linearGradient>
    <radialGradient id="cabin-wall" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6a4a2a"/>
      <stop offset="100%" stop-color="#4a3018"/>
    </radialGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a18"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <linearGradient id="roof-snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#d8e0e8"/>
    </linearGradient>
    <radialGradient id="window-warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8c4"/>
      <stop offset="100%" stop-color="#e8c060"/>
    </radialGradient>
    <radialGradient id="window-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8c4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff8c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="chimney-glow" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ff8c40" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff8c40" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pine-dark" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#0a2a18"/>
    </radialGradient>
    <radialGradient id="pine-mid" cx="48%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#1e4030"/>
      <stop offset="100%" stop-color="#0e2a1a"/>
    </radialGradient>
    <linearGradient id="path" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0a8b8"/>
      <stop offset="100%" stop-color="#8890a0"/>
    </linearGradient>
  </defs>

  <!-- Night sky -->
  <rect width="1000" height="1000" fill="url(#night-sky)"/>

  <!-- Stars -->
  <circle cx="80" cy="50" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="150" cy="90" r="1" fill="white" opacity="0.6"/>
  <circle cx="230" cy="40" r="2" fill="white" opacity="0.8"/>
  <circle cx="320" cy="100" r="1" fill="white" opacity="0.5"/>
  <circle cx="400" cy="60" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="500" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="560" cy="80" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="640" cy="45" r="1" fill="white" opacity="0.5"/>
  <circle cx="720" cy="95" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="810" cy="55" r="1" fill="white" opacity="0.6"/>
  <circle cx="880" cy="75" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="950" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="180" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="440" cy="130" r="1" fill="white" opacity="0.5"/>
  <circle cx="680" cy="120" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="920" cy="140" r="1" fill="white" opacity="0.4"/>
  <!-- Twinkling -->
  <circle cx="300" cy="70" r="2" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="50" r="1.5" fill="white" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="100" r="2" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Moon -->
  <circle cx="180" cy="120" r="80" fill="url(#moon-glow)"/>
  <circle cx="180" cy="120" r="32" fill="#f0f0d8"/>
  <circle cx="172" cy="115" r="5" fill="#e4e4c8" opacity="0.4"/>
  <circle cx="190" cy="125" r="3" fill="#e4e4c8" opacity="0.3"/>

  <!-- Distant mountains -->
  <polygon points="0,450 200,280 400,450" fill="#1a2a3e" opacity="0.6"/>
  <polygon points="250,450 500,250 750,450" fill="#1a2a40" opacity="0.5"/>
  <polygon points="550,450 800,300 1000,450" fill="#1a2a3e" opacity="0.6"/>
  <!-- Mountain snow caps -->
  <polygon points="200,280 180,310 220,310" fill="#c0d0e0" opacity="0.3"/>
  <polygon points="500,250 475,285 525,285" fill="#c0d0e0" opacity="0.3"/>
  <polygon points="800,300 778,330 822,330" fill="#c0d0e0" opacity="0.3"/>

  <!-- Snowy ground -->
  <rect x="0" y="580" width="1000" height="420" fill="url(#ground-snow)"/>
  <ellipse cx="500" cy="590" rx="520" ry="25" fill="#e0e8f0"/>

  <!-- Snow mounds -->
  <ellipse cx="150" cy="620" rx="120" ry="25" fill="#e8eef4"/>
  <ellipse cx="750" cy="630" rx="150" ry="28" fill="#e4ecf2"/>
  <ellipse cx="400" cy="700" rx="180" ry="30" fill="#e8eef4"/>

  <!-- === PINE TREES === -->
  <!-- Tree left cluster -->
  <g transform="translate(80, 380)">
    <rect x="-6" y="100" width="12" height="100" fill="#2a1a0a" rx="3"/>
    <polygon points="0,0 -50,100 50,100" fill="url(#pine-dark)"/>
    <polygon points="0,30 -42,95 42,95" fill="url(#pine-mid)"/>
    <polygon points="0,55 -35,95 35,95" fill="url(#pine-dark)"/>
    <!-- Snow on branches -->
    <ellipse cx="-20" cy="55" rx="18" ry="5" fill="#e0e8f0" opacity="0.6"/>
    <ellipse cx="22" cy="60" rx="15" ry="4" fill="#e0e8f0" opacity="0.5"/>
    <ellipse cx="0" cy="35" rx="12" ry="4" fill="#e0e8f0" opacity="0.5"/>
  </g>
  <g transform="translate(40, 420)" opacity="0.7">
    <rect x="-5" y="80" width="10" height="80" fill="#2a1a0a" rx="3"/>
    <polygon points="0,0 -38,80 38,80" fill="url(#pine-dark)"/>
    <polygon points="0,25 -30,75 30,75" fill="url(#pine-mid)"/>
    <ellipse cx="-15" cy="40" rx="12" ry="4" fill="#e0e8f0" opacity="0.5"/>
  </g>

  <!-- Tree right cluster -->
  <g transform="translate(870, 360)">
    <rect x="-7" y="110" width="14" height="110" fill="#2a1a0a" rx="3"/>
    <polygon points="0,0 -55,110 55,110" fill="url(#pine-dark)"/>
    <polygon points="0,35 -45,105 45,105" fill="url(#pine-mid)"/>
    <polygon points="0,60 -38,105 38,105" fill="url(#pine-dark)"/>
    <ellipse cx="-25" cy="50" rx="18" ry="5" fill="#e0e8f0" opacity="0.6"/>
    <ellipse cx="20" cy="55" rx="15" ry="4" fill="#e0e8f0" opacity="0.5"/>
    <ellipse cx="0" cy="30" rx="12" ry="4" fill="#e0e8f0" opacity="0.5"/>
  </g>
  <g transform="translate(940, 400)" opacity="0.7">
    <rect x="-5" y="80" width="10" height="85" fill="#2a1a0a" rx="3"/>
    <polygon points="0,0 -35,80 35,80" fill="url(#pine-mid)"/>
    <polygon points="0,25 -28,75 28,75" fill="url(#pine-dark)"/>
    <ellipse cx="15" cy="38" rx="12" ry="4" fill="#e0e8f0" opacity="0.5"/>
  </g>

  <!-- Single pine behind cabin -->
  <g transform="translate(560, 340)" opacity="0.5">
    <rect x="-6" y="100" width="12" height="130" fill="#2a1a0a" rx="3"/>
    <polygon points="0,0 -45,100 45,100" fill="url(#pine-dark)"/>
    <polygon points="0,30 -38,95 38,95" fill="url(#pine-mid)"/>
  </g>

  <!-- === CABIN === -->
  <g id="cabin" transform="translate(350, 440)">
    <!-- Wall -->
    <rect x="0" y="0" width="250" height="160" fill="url(#cabin-wall)"/>
    <!-- Log lines -->
    <line x1="0" y1="25" x2="250" y2="25" stroke="#3a2010" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="50" x2="250" y2="50" stroke="#3a2010" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="75" x2="250" y2="75" stroke="#3a2010" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="100" x2="250" y2="100" stroke="#3a2010" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="125" x2="250" y2="125" stroke="#3a2010" stroke-width="1.5" opacity="0.4"/>

    <!-- Roof -->
    <polygon points="-20,0 125,-80 270,0" fill="url(#roof)"/>
    <!-- Snow on roof -->
    <polygon points="-22,-2 125,-82 272,-2" fill="url(#roof-snow)" opacity="0.85"/>
    <!-- Snow dripping off edge -->
    <ellipse cx="10" cy="2" rx="15" ry="8" fill="#e0e8f0" opacity="0.7"/>
    <ellipse cx="240" cy="3" rx="18" ry="9" fill="#e0e8f0" opacity="0.7"/>
    <ellipse cx="125" cy="-78" rx="10" ry="6" fill="#e8eef4" opacity="0.6"/>

    <!-- Chimney -->
    <rect x="180" y="-70" width="30" height="50" fill="#4a3020"/>
    <rect x="175" y="-75" width="40" height="8" fill="#3a2010" rx="2"/>
    <!-- Snow on chimney top -->
    <ellipse cx="195" cy="-78" rx="22" ry="6" fill="#e0e8f0"/>
    <!-- Chimney warm glow -->
    <circle cx="195" cy="-80" r="30" fill="url(#chimney-glow)"/>
    <!-- Smoke -->
    <circle cx="195" cy="-100" r="8" fill="#8090a0" opacity="0.15">
      <animate attributeName="cy" values="-100;-180" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="8;20" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="-120" r="10" fill="#8090a0" opacity="0.12">
      <animate attributeName="cy" values="-120;-210" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="r" values="10;25" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="192" cy="-90" r="6" fill="#8090a0" opacity="0.1">
      <animate attributeName="cy" values="-90;-170" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;18" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- Door -->
    <rect x="100" y="80" width="50" height="80" fill="#3a2010" rx="3"/>
    <rect x="103" y="83" width="44" height="74" fill="#2a1808" rx="2"/>
    <circle cx="140" cy="120" r="3" fill="#a08040"/>

    <!-- Left window (warm glow) -->
    <rect x="25" y="35" width="50" height="40" fill="url(#window-warm)" rx="2"/>
    <rect x="25" y="35" width="50" height="40" fill="none" stroke="#3a2010" stroke-width="3" rx="2"/>
    <line x1="50" y1="35" x2="50" y2="75" stroke="#3a2010" stroke-width="2"/>
    <line x1="25" y1="55" x2="75" y2="55" stroke="#3a2010" stroke-width="2"/>
    <!-- Window glow on ground -->
    <ellipse cx="50" cy="165" rx="40" ry="15" fill="#fff8c4" opacity="0.08"/>
    <!-- Light spill -->
    <polygon points="25,75 10,160 90,160 75,75" fill="#fff8c4" opacity="0.04"/>

    <!-- Right window -->
    <rect x="175" y="35" width="50" height="40" fill="url(#window-warm)" rx="2"/>
    <rect x="175" y="35" width="50" height="40" fill="none" stroke="#3a2010" stroke-width="3" rx="2"/>
    <line x1="200" y1="35" x2="200" y2="75" stroke="#3a2010" stroke-width="2"/>
    <line x1="175" y1="55" x2="225" y2="55" stroke="#3a2010" stroke-width="2"/>
    <ellipse cx="200" cy="165" rx="40" ry="15" fill="#fff8c4" opacity="0.08"/>
    <polygon points="175,75 160,160 240,160 225,75" fill="#fff8c4" opacity="0.04"/>

    <!-- Window glow halos -->
    <circle cx="50" cy="55" r="45" fill="url(#window-glow)"/>
    <circle cx="200" cy="55" r="45" fill="url(#window-glow)"/>
  </g>

  <!-- Snow-covered path to cabin -->
  <path d="M475,600 Q470,650 480,700 Q490,750 475,800 Q460,850 470,920" stroke="url(#path)" stroke-width="35" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Snowman -->
  <g transform="translate(680, 580)">
    <circle cx="0" cy="30" r="28" fill="#e8eef4" stroke="#c8d0d8" stroke-width="1"/>
    <circle cx="0" cy="-5" r="20" fill="#e8eef4" stroke="#c8d0d8" stroke-width="1"/>
    <circle cx="0" cy="-32" r="15" fill="#e8eef4" stroke="#c8d0d8" stroke-width="1"/>
    <!-- Eyes -->
    <circle cx="-5" cy="-35" r="2" fill="#1a1a2a"/>
    <circle cx="5" cy="-35" r="2" fill="#1a1a2a"/>
    <!-- Carrot nose -->
    <polygon points="0,-30 12,-28 0,-26" fill="#ff8c40"/>
    <!-- Smile (dots) -->
    <circle cx="-6" cy="-24" r="1.5" fill="#1a1a2a"/>
    <circle cx="-2" cy="-22" r="1.5" fill="#1a1a2a"/>
    <circle cx="3" cy="-22" r="1.5" fill="#1a1a2a"/>
    <circle cx="7" cy="-24" r="1.5" fill="#1a1a2a"/>
    <!-- Buttons -->
    <circle cx="0" cy="-8" r="2.5" fill="#1a1a2a"/>
    <circle cx="0" cy="5" r="2.5" fill="#1a1a2a"/>
    <circle cx="0" cy="18" r="2.5" fill="#1a1a2a"/>
    <!-- Scarf -->
    <rect x="-22" y="-20" width="44" height="8" fill="#d04040" rx="3"/>
    <rect x="15" y="-20" width="8" height="25" fill="#d04040" rx="3"/>
    <!-- Stick arms -->
    <line x1="-20" y1="-5" x2="-45" y2="-20" stroke="#4a3018" stroke-width="3" stroke-linecap="round"/>
    <line x1="-40" y1="-17" x2="-48" y2="-28" stroke="#4a3018" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="-5" x2="45" y2="-18" stroke="#4a3018" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="-15" x2="48" y2="-25" stroke="#4a3018" stroke-width="2" stroke-linecap="round"/>
    <!-- Hat -->
    <rect x="-12" y="-50" width="24" height="20" fill="#1a1a2a" rx="2"/>
    <rect x="-18" y="-48" width="36" height="5" fill="#1a1a2a" rx="2"/>
  </g>

  <!-- Gentle snowfall -->
  <g fill="white">
    <circle cx="100" cy="200" r="2" opacity="0.6">
      <animate attributeName="cy" values="200;1000" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="100" r="1.5" opacity="0.5">
      <animate attributeName="cy" values="100;1000" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="2" opacity="0.6">
      <animate attributeName="cy" values="300;1000" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="150" r="1.5" opacity="0.5">
      <animate attributeName="cy" values="150;1000" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="250" r="2" opacity="0.6">
      <animate attributeName="cy" values="250;1000" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="180" r="1.5" opacity="0.5">
      <animate attributeName="cy" values="180;1000" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="400" r="2" opacity="0.4">
      <animate attributeName="cy" values="400;1000" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="470" cy="50" r="1.5" opacity="0.5">
      <animate attributeName="cy" values="50;1000" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="630" cy="350" r="2" opacity="0.4">
      <animate attributeName="cy" values="350;1000" dur="9.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="100" r="1.5" opacity="0.5">
      <animate attributeName="cy" values="100;1000" dur="12.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="500" r="2" opacity="0.3">
      <animate attributeName="cy" values="500;1000" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="920" cy="300" r="1.5" opacity="0.4">
      <animate attributeName="cy" values="300;1000" dur="11.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Moonlight reflection on snow -->
  <ellipse cx="300" cy="650" rx="120" ry="30" fill="#e8e8d0" opacity="0.04"/>
</svg>
