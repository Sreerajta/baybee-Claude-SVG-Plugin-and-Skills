<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#b8dff0"/>
      <stop offset="100%" stop-color="#d4eeff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ab04c"/>
      <stop offset="100%" stop-color="#4a8a2c"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffee5830"/>
      <stop offset="100%" stop-color="#ffee5800"/>
    </radialGradient>
    <radialGradient id="cat-body" cx="45%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ffaa55"/>
      <stop offset="100%" stop-color="#e08830"/>
    </radialGradient>
    <radialGradient id="cat-belly" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fff0d8"/>
      <stop offset="100%" stop-color="#ffe0b8"/>
    </radialGradient>
    <radialGradient id="cat-face" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ffba68"/>
      <stop offset="100%" stop-color="#e89a40"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9070"/>
      <stop offset="100%" stop-color="#ff907000"/>
    </radialGradient>
    <radialGradient id="flower-center" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#ffeb3b"/>
    </radialGradient>
    <radialGradient id="butterfly-wing" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ba68c8"/>
      <stop offset="100%" stop-color="#8e24aa"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1000" height="600" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="820" cy="130" r="120" fill="url(#sun)"/>
  <circle cx="820" cy="130" r="45" fill="#fff9c4"/>

  <!-- Clouds -->
  <g opacity="0.6">
    <ellipse cx="200" cy="100" rx="70" ry="25" fill="white"/>
    <ellipse cx="170" cy="95" rx="42" ry="20" fill="white"/>
    <ellipse cx="240" cy="97" rx="38" ry="18" fill="white"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="550" cy="140" rx="55" ry="18" fill="white"/>
    <ellipse cx="580" cy="136" rx="32" ry="14" fill="white"/>
  </g>
  <g opacity="0.35">
    <ellipse cx="700" cy="80" rx="48" ry="16" fill="white"/>
    <ellipse cx="725" cy="76" rx="28" ry="12" fill="white"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="570" width="1000" height="430" fill="url(#ground)"/>
  <ellipse cx="500" cy="580" rx="520" ry="22" fill="#7ac05c"/>

  <!-- Garden fence background -->
  <g stroke="#c8a870" stroke-width="3" fill="none" opacity="0.35">
    <line x1="40" y1="450" x2="40" y2="570"/>
    <line x1="90" y1="450" x2="90" y2="570"/>
    <line x1="140" y1="450" x2="140" y2="570"/>
    <line x1="190" y1="450" x2="190" y2="570"/>
    <line x1="240" y1="450" x2="240" y2="570"/>
    <line x1="30" y1="480" x2="250" y2="480"/>
    <line x1="30" y1="530" x2="250" y2="530"/>
    <!-- Picket tops -->
    <polygon points="35,450 40,440 45,450" fill="#c8a870" stroke="none"/>
    <polygon points="85,450 90,440 95,450" fill="#c8a870" stroke="none"/>
    <polygon points="135,450 140,440 145,450" fill="#c8a870" stroke="none"/>
    <polygon points="185,450 190,440 195,450" fill="#c8a870" stroke="none"/>
    <polygon points="235,450 240,440 245,450" fill="#c8a870" stroke="none"/>
  </g>

  <!-- Garden flowers - back row -->
  <g id="flowers-back">
    <!-- Tall sunflower left -->
    <g transform="translate(140, 480)">
      <rect x="-3" y="0" width="6" height="90" fill="#3a8a2c" rx="2"/>
      <!-- Leaves on stem -->
      <ellipse cx="-14" cy="40" rx="12" ry="5" fill="#4a9a3c" transform="rotate(-30,-14,40)"/>
      <ellipse cx="14" cy="60" rx="11" ry="5" fill="#4a9a3c" transform="rotate(25,14,60)"/>
      <circle cx="0" cy="-8" r="20" fill="#f9a825"/>
      <circle cx="0" cy="-8" r="11" fill="#5d4037"/>
      <circle cx="0" cy="-8" r="8" fill="#6d4c41"/>
      <!-- Petals -->
      <ellipse cx="0" cy="-28" rx="5" ry="10" fill="#fdd835"/>
      <ellipse cx="14" cy="-22" rx="5" ry="10" fill="#fdd835" transform="rotate(45,14,-22)"/>
      <ellipse cx="20" cy="-8" rx="5" ry="10" fill="#fdd835" transform="rotate(90,20,-8)"/>
      <ellipse cx="14" cy="6" rx="5" ry="10" fill="#fdd835" transform="rotate(135,14,6)"/>
      <ellipse cx="0" cy="12" rx="5" ry="10" fill="#fdd835" transform="rotate(180,0,12)"/>
      <ellipse cx="-14" cy="6" rx="5" ry="10" fill="#fdd835" transform="rotate(-135,-14,6)"/>
      <ellipse cx="-20" cy="-8" rx="5" ry="10" fill="#fdd835" transform="rotate(-90,-20,-8)"/>
      <ellipse cx="-14" cy="-22" rx="5" ry="10" fill="#fdd835" transform="rotate(-45,-14,-22)"/>
    </g>

    <!-- Purple flowers cluster right -->
    <g transform="translate(800, 510)">
      <rect x="-2" y="0" width="4" height="60" fill="#3a8a2c" rx="2"/>
      <circle cx="0" cy="-8" r="12" fill="#9c27b0"/>
      <circle cx="0" cy="-8" r="6" fill="url(#flower-center)"/>
    </g>
    <g transform="translate(830, 520)">
      <rect x="-2" y="0" width="4" height="50" fill="#3a8a2c" rx="2"/>
      <circle cx="0" cy="-7" r="10" fill="#ab47bc"/>
      <circle cx="0" cy="-7" r="5" fill="url(#flower-center)"/>
    </g>
    <g transform="translate(860, 515)">
      <rect x="-2" y="0" width="4" height="55" fill="#3a8a2c" rx="2"/>
      <circle cx="0" cy="-7" r="11" fill="#9c27b0"/>
      <circle cx="0" cy="-7" r="5.5" fill="url(#flower-center)"/>
    </g>

    <!-- Red tulips -->
    <g transform="translate(650, 520)">
      <rect x="-2" y="0" width="4" height="50" fill="#3a8a2c" rx="2"/>
      <ellipse cx="0" cy="-10" rx="8" ry="14" fill="#e53935"/>
      <ellipse cx="-6" cy="-5" rx="5" ry="10" fill="#ef5350" transform="rotate(-15,-6,-5)"/>
      <ellipse cx="6" cy="-5" rx="5" ry="10" fill="#ef5350" transform="rotate(15,6,-5)"/>
    </g>
    <g transform="translate(680, 525)">
      <rect x="-2" y="0" width="4" height="45" fill="#3a8a2c" rx="2"/>
      <ellipse cx="0" cy="-9" rx="7" ry="12" fill="#e53935"/>
      <ellipse cx="-5" cy="-4" rx="4" ry="9" fill="#ef5350" transform="rotate(-15,-5,-4)"/>
      <ellipse cx="5" cy="-4" rx="4" ry="9" fill="#ef5350" transform="rotate(15,5,-4)"/>
    </g>
  </g>

  <!-- Front row small flowers -->
  <g id="flowers-front">
    <g transform="translate(350, 620)">
      <rect x="-2" y="0" width="3" height="28" fill="#3a8a2c" rx="1"/>
      <circle cx="0" cy="-5" r="8" fill="#ff6b8a"/>
      <circle cx="0" cy="-5" r="4" fill="url(#flower-center)"/>
    </g>
    <g transform="translate(580, 630)">
      <rect x="-2" y="0" width="3" height="25" fill="#3a8a2c" rx="1"/>
      <circle cx="0" cy="-5" r="7" fill="#64b5f6"/>
      <circle cx="0" cy="-5" r="3.5" fill="url(#flower-center)"/>
    </g>
    <g transform="translate(420, 635)">
      <rect x="-1.5" y="0" width="3" height="22" fill="#3a8a2c" rx="1"/>
      <circle cx="0" cy="-4" r="6" fill="white"/>
      <circle cx="0" cy="-4" r="3" fill="url(#flower-center)"/>
    </g>
    <g transform="translate(720, 625)">
      <rect x="-2" y="0" width="3" height="26" fill="#3a8a2c" rx="1"/>
      <circle cx="0" cy="-5" r="7" fill="#ff6b8a"/>
      <circle cx="0" cy="-5" r="3.5" fill="url(#flower-center)"/>
    </g>
  </g>

  <!-- Grass tufts -->
  <g stroke="#4a9a3c" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M300,585 Q298,570 302,560"/>
    <path d="M305,585 Q308,568 304,558"/>
    <path d="M500,590 Q497,575 502,563"/>
    <path d="M505,590 Q508,573 504,562"/>
    <path d="M750,585 Q748,572 752,560"/>
    <path d="M755,585 Q758,570 754,558"/>
  </g>

  <!-- === CAT === -->
  <g id="cat" transform="translate(480, 560)">
    <!-- Tail curving up -->
    <path d="M55,0 Q90,-20 100,-55 Q108,-80 95,-90 Q82,-85 85,-70 Q88,-50 70,-20" fill="url(#cat-body)"/>
    <!-- Tail stripes -->
    <path d="M88,-30 Q92,-35 97,-30" stroke="#c87020" stroke-width="2.5" fill="none"/>
    <path d="M95,-55 Q99,-60 102,-55" stroke="#c87020" stroke-width="2" fill="none"/>
    <!-- Tail tip -->
    <ellipse cx="93" cy="-88" rx="10" ry="8" fill="#fff0d8"/>

    <!-- Back legs (sitting) -->
    <ellipse cx="35" cy="15" rx="28" ry="18" fill="#e08830" transform="rotate(-5,35,15)"/>
    <ellipse cx="-25" cy="15" rx="28" ry="18" fill="#e89840" transform="rotate(5,-25,15)"/>
    <!-- Paws showing -->
    <ellipse cx="55" cy="28" rx="14" ry="8" fill="#ffba68"/>
    <ellipse cx="-45" cy="28" rx="14" ry="8" fill="#ffba68"/>
    <!-- Paw pads -->
    <circle cx="52" cy="30" r="3" fill="#f0a080" opacity="0.6"/>
    <circle cx="58" cy="30" r="2.5" fill="#f0a080" opacity="0.6"/>
    <circle cx="-42" cy="30" r="3" fill="#f0a080" opacity="0.6"/>
    <circle cx="-48" cy="30" r="2.5" fill="#f0a080" opacity="0.6"/>

    <!-- Body -->
    <ellipse cx="0" cy="-10" rx="55" ry="42" fill="url(#cat-body)"/>
    <!-- Belly/chest -->
    <ellipse cx="0" cy="0" rx="35" ry="30" fill="url(#cat-belly)"/>

    <!-- Body stripes -->
    <path d="M-25,-40 Q-20,-30 -25,-20" stroke="#c87020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-5,-44 Q0,-34 -5,-24" stroke="#c87020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M18,-42 Q23,-32 18,-22" stroke="#c87020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M38,-36 Q43,-28 38,-18" stroke="#c87020" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Front paws -->
    <rect x="-22" y="18" width="16" height="18" fill="#e89840" rx="6"/>
    <rect x="8" y="18" width="16" height="18" fill="#ffba68" rx="6"/>
    <ellipse cx="-14" cy="38" rx="10" ry="5" fill="#ffba68"/>
    <ellipse cx="16" cy="38" rx="10" ry="5" fill="#ffba68"/>

    <!-- Head -->
    <ellipse cx="0" cy="-60" rx="42" ry="38" fill="url(#cat-face)"/>

    <!-- Ears -->
    <polygon points="-35,-90 -28,-130 -10,-92" fill="#e89a40"/>
    <polygon points="-32,-93 -28,-122 -14,-94" fill="#ffcca0"/>
    <polygon points="10,-92 28,-130 35,-90" fill="#e89a40"/>
    <polygon points="14,-94 28,-122 32,-93" fill="#ffcca0"/>
    <!-- Ear tufts -->
    <polygon points="-29,-120 -28,-130 -24,-118" fill="#2a1a0a" opacity="0.4"/>
    <polygon points="24,-118 28,-130 29,-120" fill="#2a1a0a" opacity="0.4"/>

    <!-- Inner face white -->
    <ellipse cx="0" cy="-52" rx="30" ry="25" fill="url(#cat-belly)"/>

    <!-- Eyes - big and green -->
    <ellipse cx="-15" cy="-62" rx="12" ry="13" fill="white"/>
    <ellipse cx="-15" cy="-61" rx="8" ry="10" fill="#4caf50"/>
    <ellipse cx="-15" cy="-61" rx="4" ry="8" fill="#1a1a3a"/>
    <circle cx="-12" cy="-64" r="3" fill="white"/>
    <circle cx="-17" cy="-58" r="1.5" fill="white" opacity="0.5"/>
    <ellipse cx="15" cy="-62" rx="12" ry="13" fill="white"/>
    <ellipse cx="15" cy="-61" rx="8" ry="10" fill="#4caf50"/>
    <ellipse cx="15" cy="-61" rx="4" ry="8" fill="#1a1a3a"/>
    <circle cx="18" cy="-64" r="3" fill="white"/>
    <circle cx="13" cy="-58" r="1.5" fill="white" opacity="0.5"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-48" rx="5" ry="4" fill="#e07060"/>
    <ellipse cx="-1" cy="-49" rx="2" ry="1.5" fill="#f0908a" opacity="0.5"/>

    <!-- Mouth -->
    <path d="M0,-44 Q-5,-40 -10,-42" stroke="#8a5030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M0,-44 Q5,-40 10,-42" stroke="#8a5030" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="-30" y1="-52" x2="-60" y2="-58" stroke="#d0a060" stroke-width="1" opacity="0.6"/>
    <line x1="-30" y1="-48" x2="-62" y2="-47" stroke="#d0a060" stroke-width="1" opacity="0.6"/>
    <line x1="-30" y1="-44" x2="-58" y2="-38" stroke="#d0a060" stroke-width="1" opacity="0.6"/>
    <line x1="30" y1="-52" x2="60" y2="-58" stroke="#d0a060" stroke-width="1" opacity="0.6"/>
    <line x1="30" y1="-48" x2="62" y2="-47" stroke="#d0a060" stroke-width="1" opacity="0.6"/>
    <line x1="30" y1="-44" x2="58" y2="-38" stroke="#d0a060" stroke-width="1" opacity="0.6"/>

    <!-- Cheeks -->
    <circle cx="-28" cy="-45" r="8" fill="url(#cheek)"/>
    <circle cx="28" cy="-45" r="8" fill="url(#cheek)"/>
  </g>

  <!-- === BUTTERFLY near cat === -->
  <g id="butterfly" transform="translate(380, 440)">
    <!-- Wings -->
    <ellipse cx="-12" cy="-5" rx="14" ry="10" fill="url(#butterfly-wing)" opacity="0.85" transform="rotate(-15,-12,-5)"/>
    <ellipse cx="12" cy="-5" rx="14" ry="10" fill="url(#butterfly-wing)" opacity="0.85" transform="rotate(15,12,-5)"/>
    <ellipse cx="-8" cy="6" rx="9" ry="7" fill="#ce93d8" opacity="0.75" transform="rotate(-10,-8,6)"/>
    <ellipse cx="8" cy="6" rx="9" ry="7" fill="#ce93d8" opacity="0.75" transform="rotate(10,8,6)"/>
    <!-- Wing dots -->
    <circle cx="-14" cy="-6" r="2.5" fill="white" opacity="0.4"/>
    <circle cx="14" cy="-6" r="2.5" fill="white" opacity="0.4"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="2.5" ry="10" fill="#4a2060"/>
    <!-- Antennae -->
    <path d="M-1,-10 Q-6,-18 -8,-22" stroke="#4a2060" stroke-width="1" fill="none"/>
    <circle cx="-8" cy="-22" r="1.5" fill="#4a2060"/>
    <path d="M1,-10 Q6,-18 8,-22" stroke="#4a2060" stroke-width="1" fill="none"/>
    <circle cx="8" cy="-22" r="1.5" fill="#4a2060"/>
    <!-- Float animation -->
    <animateTransform attributeName="transform" type="translate" values="380,440;390,430;380,440" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Ladybug on ground -->
  <g transform="translate(600, 600)">
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#e53935"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="-5" r="3" fill="#1a1a1a"/>
    <circle cx="-3" cy="0" r="1.5" fill="#1a1a1a"/>
    <circle cx="3" cy="2" r="1.5" fill="#1a1a1a"/>
  </g>

  <!-- Birds in sky -->
  <g stroke="#555" stroke-width="1.5" fill="none" opacity="0.35">
    <path d="M350,200 Q355,195 360,200 Q365,195 370,200"/>
    <path d="M400,180 Q404,176 408,180 Q412,176 416,180"/>
    <path d="M320,220 Q324,216 328,220 Q332,216 336,220"/>
  </g>
</svg>
