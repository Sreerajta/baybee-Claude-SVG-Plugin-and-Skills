<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0f172a" />
    </marker>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1000" height="1000" fill="#f1f5f9" />
  </g>
  <g id="nodes">
    <!-- Start -->
    <circle cx="500" cy="70" r="35" fill="#38bdf8" stroke="#0f172a" stroke-width="4" />
    <!-- Enter Credentials -->
    <rect x="375" y="170" width="250" height="60" rx="20" ry="20" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <!-- Submit -->
    <rect x="375" y="310" width="250" height="60" rx="20" ry="20" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <!-- Validate Credentials (decision diamond) -->
    <polygon points="500,430 620,510 500,590 380,510" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <!-- Success: Dashboard -->
    <rect x="175" y="660" width="250" height="60" rx="20" ry="20" fill="#38bdf8" stroke="#0f172a" stroke-width="4" />
    <!-- Failure: Show Error -->
    <rect x="575" y="660" width="250" height="60" rx="20" ry="20" fill="#334155" stroke="#0f172a" stroke-width="4" />
    <!-- End -->
    <circle cx="300" cy="820" r="35" fill="#38bdf8" stroke="#0f172a" stroke-width="4" />
    <circle cx="300" cy="820" r="25" fill="#38bdf8" stroke="#0f172a" stroke-width="3" />
    <!-- Retry limit decision -->
    <polygon points="700,800 800,855 700,910 600,855" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <!-- Locked Out -->
    <rect x="830" y="825" width="140" height="60" rx="20" ry="20" fill="#334155" stroke="#0f172a" stroke-width="4" />
  </g>
  <g id="connections">
    <!-- Start → Enter Credentials -->
    <line x1="500" y1="105" x2="500" y2="170" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
    <!-- Enter Credentials → Submit -->
    <line x1="500" y1="230" x2="500" y2="310" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
    <!-- Submit → Validate -->
    <line x1="500" y1="370" x2="500" y2="430" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
    <!-- Validate → Success (left) -->
    <line x1="380" y1="510" x2="300" y2="510" stroke="#0f172a" stroke-width="4" />
    <line x1="300" y1="510" x2="300" y2="660" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
    <!-- Validate → Failure (right) -->
    <line x1="620" y1="510" x2="700" y2="510" stroke="#0f172a" stroke-width="4" />
    <line x1="700" y1="510" x2="700" y2="660" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
    <!-- Success → End -->
    <line x1="300" y1="720" x2="300" y2="785" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
    <!-- Failure → Retry limit -->
    <line x1="700" y1="720" x2="700" y2="800" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
    <!-- Retry limit → Enter Credentials (loop back left) -->
    <line x1="600" y1="855" x2="160" y2="855" stroke="#0f172a" stroke-width="4" />
    <line x1="160" y1="855" x2="160" y2="200" stroke="#0f172a" stroke-width="4" />
    <line x1="160" y1="200" x2="375" y2="200" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
    <!-- Retry limit → Locked Out (right) -->
    <line x1="800" y1="855" x2="830" y2="855" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
  </g>
  <g id="labels">
    <!-- Start label -->
    <text x="500" y="76" text-anchor="middle" font-size="20" fill="#0f172a" font-family="sans-serif">Start</text>
    <!-- Enter Credentials label -->
    <text x="500" y="207" text-anchor="middle" font-size="22" fill="#0f172a" font-family="sans-serif">Enter Credentials</text>
    <!-- Submit label -->
    <text x="500" y="347" text-anchor="middle" font-size="22" fill="#0f172a" font-family="sans-serif">Submit</text>
    <!-- Validate label -->
    <text x="500" y="515" text-anchor="middle" font-size="20" fill="#0f172a" font-family="sans-serif">Valid?</text>
    <!-- Yes label -->
    <text x="325" y="500" text-anchor="middle" font-size="18" fill="#38bdf8" font-family="sans-serif">Yes</text>
    <!-- No label -->
    <text x="675" y="500" text-anchor="middle" font-size="18" fill="#334155" font-family="sans-serif">No</text>
    <!-- Dashboard label -->
    <text x="300" y="697" text-anchor="middle" font-size="22" fill="#0f172a" font-family="sans-serif">Dashboard</text>
    <!-- Show Error label -->
    <text x="700" y="697" text-anchor="middle" font-size="22" fill="#f1f5f9" font-family="sans-serif">Show Error</text>
    <!-- End label -->
    <text x="300" y="880" text-anchor="middle" font-size="18" fill="#0f172a" font-family="sans-serif">End</text>
    <!-- Retry label -->
    <text x="700" y="860" text-anchor="middle" font-size="18" fill="#0f172a" font-family="sans-serif">Retries?</text>
    <!-- Yes retry -->
    <text x="560" y="845" text-anchor="middle" font-size="18" fill="#38bdf8" font-family="sans-serif">Yes</text>
    <!-- No retry -->
    <text x="818" y="845" text-anchor="middle" font-size="18" fill="#334155" font-family="sans-serif">No</text>
    <!-- Locked Out label -->
    <text x="900" y="861" text-anchor="middle" font-size="20" fill="#f1f5f9" font-family="sans-serif">Locked</text>
  </g>
</svg>
