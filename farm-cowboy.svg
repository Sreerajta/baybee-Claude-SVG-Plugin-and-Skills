<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <g id="background">
    <!-- Sky -->
    <rect x="0" y="0" width="1000" height="620" fill="#38bdf8" />
    <!-- Sun -->
    <circle cx="880" cy="110" r="60" fill="#fbbf24" opacity="0.85" />
    <!-- Ground -->
    <rect x="0" y="620" width="1000" height="380" fill="#4ade80" />
    <rect x="0" y="620" width="1000" height="40" fill="#22c55e" />
  </g>
  <g id="environment">
    <!-- Clouds -->
    <ellipse cx="200" cy="100" rx="80" ry="30" fill="#f1f5f9" opacity="0.8" />
    <ellipse cx="265" cy="90" rx="55" ry="25" fill="#f1f5f9" opacity="0.8" />
    <ellipse cx="150" cy="95" rx="50" ry="22" fill="#f1f5f9" opacity="0.8" />
    <ellipse cx="650" cy="140" rx="70" ry="26" fill="#f1f5f9" opacity="0.7" />
    <ellipse cx="710" cy="132" rx="52" ry="22" fill="#f1f5f9" opacity="0.7" />
    <!-- Hills -->
    <ellipse cx="250" cy="620" rx="280" ry="65" fill="#22c55e" />
    <ellipse cx="750" cy="620" rx="320" ry="55" fill="#22c55e" />
    <!-- Dirt path -->
    <ellipse cx="500" cy="820" rx="350" ry="45" fill="#a3845b" opacity="0.3" />
  </g>
  <g id="structures">
    <!-- Barn body -->
    <rect x="60" y="380" width="230" height="240" rx="4" ry="4" fill="#dc2626" stroke="#0f172a" stroke-width="5" />
    <!-- Barn roof -->
    <polygon points="40,380 175,280 310,380" fill="#7f1d1d" stroke="#0f172a" stroke-width="5" />
    <!-- Barn door -->
    <rect x="135" y="500" width="80" height="120" rx="8" ry="8" fill="#334155" stroke="#0f172a" stroke-width="4" />
    <!-- Barn window -->
    <rect x="85" y="420" width="40" height="40" rx="4" ry="4" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" />
    <line x1="105" y1="420" x2="105" y2="460" stroke="#0f172a" stroke-width="2" />
    <line x1="85" y1="440" x2="125" y2="440" stroke="#0f172a" stroke-width="2" />
    <!-- Barn hay loft -->
    <rect x="240" y="420" width="35" height="35" rx="4" ry="4" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" />
    <!-- Fence -->
    <line x1="310" y1="590" x2="680" y2="590" stroke="#a3845b" stroke-width="6" />
    <line x1="310" y1="620" x2="680" y2="620" stroke="#a3845b" stroke-width="6" />
    <rect x="308" y="572" width="10" height="72" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
    <rect x="408" y="572" width="10" height="72" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
    <rect x="508" y="572" width="10" height="72" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
    <rect x="608" y="572" width="10" height="72" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
    <rect x="673" y="572" width="10" height="72" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
  </g>
  <g id="characters">
    <!-- === COW === -->
    <g id="cow">
      <!-- Cow body -->
      <ellipse cx="450" cy="530" rx="100" ry="60" fill="#f1f5f9" stroke="#0f172a" stroke-width="5" />
      <!-- Cow spots -->
      <ellipse cx="415" cy="515" rx="22" ry="16" fill="#334155" />
      <ellipse cx="475" cy="540" rx="18" ry="13" fill="#334155" />
      <ellipse cx="445" cy="555" rx="14" ry="10" fill="#334155" />
      <!-- Cow legs -->
      <rect x="375" y="575" width="20" height="55" rx="6" ry="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
      <rect x="410" y="578" width="20" height="52" rx="6" ry="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
      <rect x="480" y="578" width="20" height="52" rx="6" ry="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
      <rect x="515" y="575" width="20" height="55" rx="6" ry="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
      <!-- Cow head -->
      <rect x="530" y="470" width="72" height="58" rx="18" ry="18" fill="#f1f5f9" stroke="#0f172a" stroke-width="5" />
      <!-- Cow snout -->
      <ellipse cx="590" cy="510" rx="22" ry="16" fill="#f5d0c5" stroke="#0f172a" stroke-width="3" />
      <!-- Cow nostrils -->
      <circle cx="584" cy="511" r="3.5" fill="#334155" />
      <circle cx="596" cy="511" r="3.5" fill="#334155" />
      <!-- Cow eyes -->
      <circle cx="548" cy="485" r="7" fill="#0f172a" />
      <circle cx="550" cy="483" r="2.5" fill="#f1f5f9" />
      <circle cx="578" cy="485" r="7" fill="#0f172a" />
      <circle cx="580" cy="483" r="2.5" fill="#f1f5f9" />
      <!-- Cow ears -->
      <ellipse cx="533" cy="465" rx="16" ry="9" fill="#f5d0c5" stroke="#0f172a" stroke-width="3" transform="rotate(-25, 533, 465)" />
      <ellipse cx="600" cy="465" rx="16" ry="9" fill="#f5d0c5" stroke="#0f172a" stroke-width="3" transform="rotate(25, 600, 465)" />
      <!-- Cow horns -->
      <polygon points="542,462 537,438 550,452" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" />
      <polygon points="592,462 597,438 584,452" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" />
      <!-- Cow tail -->
      <path d="M 350,520 Q 325,505 315,480 Q 310,465 320,458" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
      <ellipse cx="320" cy="454" rx="7" ry="5" fill="#334155" />
      <!-- Cow udder -->
      <ellipse cx="460" cy="585" rx="18" ry="10" fill="#f5d0c5" stroke="#0f172a" stroke-width="2" />
    </g>

    <!-- === HORSE === -->
    <g id="horse">
      <!-- Horse body -->
      <ellipse cx="870" cy="480" rx="90" ry="65" fill="#92400e" stroke="#0f172a" stroke-width="5" />
      <!-- Horse body highlight -->
      <ellipse cx="880" cy="500" rx="50" ry="30" fill="#a16207" opacity="0.3" />
      <!-- Horse neck -->
      <path d="M 810,460 Q 790,400 780,360" fill="none" stroke="#92400e" stroke-width="50" stroke-linecap="round" />
      <path d="M 810,460 Q 790,400 780,360" fill="none" stroke="#0f172a" stroke-width="5" stroke-linecap="round" />
      <!-- Horse neck fill -->
      <ellipse cx="795" cy="410" rx="24" ry="55" fill="#92400e" transform="rotate(-12, 795, 410)" />
      <!-- Horse head -->
      <ellipse cx="770" cy="340" rx="35" ry="28" fill="#92400e" stroke="#0f172a" stroke-width="5" transform="rotate(-10, 770, 340)" />
      <!-- Horse snout -->
      <ellipse cx="748" cy="358" rx="22" ry="18" fill="#a16207" stroke="#0f172a" stroke-width="4" />
      <!-- Horse nostrils -->
      <circle cx="740" cy="362" r="3" fill="#0f172a" />
      <circle cx="752" cy="364" r="3" fill="#0f172a" />
      <!-- Horse mouth -->
      <path d="M 732,368 Q 740,374 748,370" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" />
      <!-- Horse eye -->
      <circle cx="775" cy="332" r="7" fill="#0f172a" />
      <circle cx="777" cy="330" r="3" fill="#f1f5f9" />
      <!-- Horse ears -->
      <polygon points="762,312 755,285 770,305" fill="#92400e" stroke="#0f172a" stroke-width="3" stroke-linejoin="round" />
      <polygon points="785,310 782,282 795,302" fill="#92400e" stroke="#0f172a" stroke-width="3" stroke-linejoin="round" />
      <!-- Horse ear inner -->
      <polygon points="763,310 758,293 769,306" fill="#a16207" />
      <polygon points="786,308 784,290 793,303" fill="#a16207" />
      <!-- Horse mane -->
      <path d="M 775,310 Q 790,330 800,360 Q 808,385 810,420" fill="none" stroke="#334155" stroke-width="10" stroke-linecap="round" opacity="0.7" />
      <path d="M 770,305 Q 782,325 792,350 Q 800,375 805,410" fill="none" stroke="#0f172a" stroke-width="6" stroke-linecap="round" opacity="0.4" />
      <!-- Horse front legs -->
      <rect x="825" y="530" width="18" height="85" rx="6" ry="6" fill="#92400e" stroke="#0f172a" stroke-width="4" />
      <rect x="850" y="533" width="18" height="82" rx="6" ry="6" fill="#92400e" stroke="#0f172a" stroke-width="4" />
      <!-- Horse back legs -->
      <rect x="910" y="528" width="18" height="87" rx="6" ry="6" fill="#92400e" stroke="#0f172a" stroke-width="4" />
      <rect x="935" y="530" width="18" height="85" rx="6" ry="6" fill="#92400e" stroke="#0f172a" stroke-width="4" />
      <!-- Horse hooves -->
      <rect x="823" y="610" width="22" height="14" rx="4" ry="4" fill="#334155" stroke="#0f172a" stroke-width="3" />
      <rect x="848" y="610" width="22" height="14" rx="4" ry="4" fill="#334155" stroke="#0f172a" stroke-width="3" />
      <rect x="908" y="610" width="22" height="14" rx="4" ry="4" fill="#334155" stroke="#0f172a" stroke-width="3" />
      <rect x="933" y="610" width="22" height="14" rx="4" ry="4" fill="#334155" stroke="#0f172a" stroke-width="3" />
      <!-- Horse tail -->
      <path d="M 958,470 Q 980,460 985,430 Q 988,410 975,400" fill="none" stroke="#334155" stroke-width="8" stroke-linecap="round" />
      <path d="M 958,475 Q 985,465 990,440 Q 992,420 980,408" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" opacity="0.4" />
      <!-- Saddle -->
      <ellipse cx="870" cy="465" rx="40" ry="18" fill="#78350f" stroke="#0f172a" stroke-width="4" />
      <!-- Saddle horn -->
      <rect x="838" y="452" width="10" height="16" rx="4" ry="4" fill="#5c2d0e" stroke="#0f172a" stroke-width="2" />
      <!-- Saddle blanket edge -->
      <rect x="840" y="478" width="60" height="6" rx="2" ry="2" fill="#dc2626" stroke="#0f172a" stroke-width="2" />
      <!-- Stirrup left -->
      <path d="M 845,484 L 840,520 L 850,520" fill="none" stroke="#334155" stroke-width="3" />
      <!-- Stirrup right -->
      <path d="M 895,484 L 900,520 L 890,520" fill="none" stroke="#334155" stroke-width="3" />
      <!-- Bridle -->
      <path d="M 748,350 Q 760,365 775,355" fill="none" stroke="#334155" stroke-width="3" />
      <path d="M 760,340 L 760,365" fill="none" stroke="#334155" stroke-width="2.5" />
      <!-- Reins hanging -->
      <path d="M 748,358 Q 760,390 780,400 Q 800,410 810,430" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" />
    </g>

    <!-- === COWBOY === -->
    <g id="cowboy">
      <!-- Cowboy legs -->
      <rect x="720" y="640" width="22" height="90" rx="6" ry="6" fill="#1e40af" stroke="#0f172a" stroke-width="4" />
      <rect x="758" y="640" width="22" height="90" rx="6" ry="6" fill="#1e40af" stroke="#0f172a" stroke-width="4" />
      <!-- Boots -->
      <rect x="715" y="720" width="30" height="20" rx="6" ry="6" fill="#78350f" stroke="#0f172a" stroke-width="3" />
      <rect x="755" y="720" width="30" height="20" rx="6" ry="6" fill="#78350f" stroke="#0f172a" stroke-width="3" />
      <!-- Boot heels -->
      <rect x="713" y="730" width="8" height="10" rx="2" ry="2" fill="#5c2d0e" stroke="#0f172a" stroke-width="2" />
      <rect x="783" y="730" width="8" height="10" rx="2" ry="2" fill="#5c2d0e" stroke="#0f172a" stroke-width="2" />
      <!-- Body / torso -->
      <rect x="710" y="540" width="80" height="110" rx="12" ry="12" fill="#92400e" stroke="#0f172a" stroke-width="5" />
      <!-- Belt -->
      <rect x="708" y="635" width="84" height="12" rx="3" ry="3" fill="#78350f" stroke="#0f172a" stroke-width="3" />
      <!-- Belt buckle -->
      <rect x="742" y="633" width="16" height="16" rx="2" ry="2" fill="#fbbf24" stroke="#0f172a" stroke-width="2" />
      <!-- Vest -->
      <rect x="720" y="555" width="60" height="80" rx="6" ry="6" fill="#a16207" stroke="#0f172a" stroke-width="3" />
      <!-- Bandana -->
      <polygon points="735,530 750,555 765,530" fill="#dc2626" stroke="#0f172a" stroke-width="3" />

      <!-- Left arm (resting) -->
      <g id="cowboy-left-arm">
        <rect x="690" y="555" width="22" height="70" rx="8" ry="8" fill="#92400e" stroke="#0f172a" stroke-width="4" transform="rotate(10, 690, 555)" />
        <!-- Left hand -->
        <circle cx="685" cy="628" r="10" fill="#f5d0c5" stroke="#0f172a" stroke-width="3" />
      </g>

      <!-- Right arm (holding gun) -->
      <g id="cowboy-right-arm">
        <rect x="788" y="555" width="22" height="70" rx="8" ry="8" fill="#92400e" stroke="#0f172a" stroke-width="4" transform="rotate(-15, 788, 555)" />
        <!-- Right hand -->
        <g id="right-hand">
          <circle cx="800" cy="620" r="10" fill="#f5d0c5" stroke="#0f172a" stroke-width="3" />
          <!-- Gun (prop attached to hand) -->
          <g id="gun">
            <!-- Gun barrel -->
            <rect x="808" y="605" width="40" height="8" rx="2" ry="2" fill="#334155" stroke="#0f172a" stroke-width="3" />
            <!-- Gun body -->
            <rect x="800" y="600" width="18" height="18" rx="3" ry="3" fill="#334155" stroke="#0f172a" stroke-width="3" />
            <!-- Gun grip -->
            <rect x="802" y="618" width="12" height="22" rx="3" ry="3" fill="#78350f" stroke="#0f172a" stroke-width="2" />
            <!-- Trigger guard -->
            <path d="M 808,618 Q 812,630 816,618" fill="none" stroke="#0f172a" stroke-width="2" />
          </g>
        </g>
      </g>

      <!-- Head -->
      <g id="cowboy-head">
        <circle cx="750" cy="490" r="42" fill="#f5d0c5" stroke="#0f172a" stroke-width="5" />
        <!-- Eyes -->
        <circle cx="738" cy="488" r="5" fill="#0f172a" />
        <circle cx="739" cy="486" r="2" fill="#f1f5f9" />
        <circle cx="762" cy="488" r="5" fill="#0f172a" />
        <circle cx="763" cy="486" r="2" fill="#f1f5f9" />
        <!-- Nose -->
        <ellipse cx="750" cy="500" rx="5" ry="4" fill="#d4a68c" />
        <!-- Mouth / smirk -->
        <path d="M 740,510 Q 750,518 760,510" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round" />
        <!-- Stubble dots -->
        <circle cx="735" cy="515" r="1" fill="#334155" opacity="0.3" />
        <circle cx="745" cy="518" r="1" fill="#334155" opacity="0.3" />
        <circle cx="755" cy="518" r="1" fill="#334155" opacity="0.3" />
        <circle cx="765" cy="515" r="1" fill="#334155" opacity="0.3" />
      </g>

      <!-- Cowboy hat -->
      <g id="cowboy-hat">
        <!-- Hat brim -->
        <ellipse cx="750" cy="458" rx="55" ry="12" fill="#78350f" stroke="#0f172a" stroke-width="4" />
        <!-- Hat crown -->
        <rect x="720" y="420" width="60" height="40" rx="8" ry="8" fill="#92400e" stroke="#0f172a" stroke-width="4" />
        <!-- Hat band -->
        <rect x="720" y="450" width="60" height="8" rx="2" ry="2" fill="#fbbf24" stroke="#0f172a" stroke-width="2" />
        <!-- Hat top indent -->
        <path d="M 728,420 Q 750,428 772,420" fill="none" stroke="#0f172a" stroke-width="2" />
      </g>
    </g>
  </g>
  <g id="foreground">
    <!-- Flowers -->
    <circle cx="350" cy="700" r="7" fill="#f472b6" />
    <circle cx="343" cy="693" r="4" fill="#f9a8d4" />
    <circle cx="357" cy="693" r="4" fill="#f9a8d4" />
    <circle cx="620" cy="710" r="6" fill="#38bdf8" />
    <circle cx="614" cy="704" r="3.5" fill="#7dd3fc" />
    <circle cx="626" cy="704" r="3.5" fill="#7dd3fc" />
    <circle cx="850" cy="690" r="7" fill="#f472b6" />
    <circle cx="843" cy="683" r="4" fill="#f9a8d4" />
    <circle cx="857" cy="683" r="4" fill="#f9a8d4" />
    <!-- Grass tufts -->
    <path d="M 160,680 Q 165,660 170,680" fill="none" stroke="#16a34a" stroke-width="3" />
    <path d="M 170,680 Q 177,655 184,680" fill="none" stroke="#16a34a" stroke-width="3" />
    <path d="M 900,695 Q 905,675 910,695" fill="none" stroke="#16a34a" stroke-width="3" />
    <path d="M 910,695 Q 917,670 924,695" fill="none" stroke="#16a34a" stroke-width="3" />
    <!-- Tumbleweed hint -->
    <circle cx="660" cy="720" r="15" fill="none" stroke="#a3845b" stroke-width="2" opacity="0.3" stroke-dasharray="3,3" />
  </g>
</svg>
