<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <g id="background">
    <rect x="0" y="0" width="1000" height="1000" fill="#38bdf8" />
    <!-- Clouds -->
    <ellipse cx="150" cy="200" rx="90" ry="35" fill="#f1f5f9" opacity="0.7" />
    <ellipse cx="220" cy="190" rx="65" ry="28" fill="#f1f5f9" opacity="0.7" />
    <ellipse cx="100" cy="195" rx="55" ry="25" fill="#f1f5f9" opacity="0.7" />
    <ellipse cx="750" cy="350" rx="80" ry="30" fill="#f1f5f9" opacity="0.6" />
    <ellipse cx="815" cy="340" rx="60" ry="25" fill="#f1f5f9" opacity="0.6" />
    <ellipse cx="400" cy="700" rx="100" ry="32" fill="#f1f5f9" opacity="0.5" />
    <ellipse cx="480" cy="690" rx="70" ry="26" fill="#f1f5f9" opacity="0.5" />
  </g>
  <g id="character">
    <!-- Tail feathers -->
    <g id="tail">
      <path d="M 430,540 Q 370,560 340,600" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
      <path d="M 430,535 Q 365,540 330,570" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
      <path d="M 430,545 Q 375,580 350,630" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
      <animateTransform attributeName="transform" type="rotate"
        values="-5 430 540;5 430 540;-5 430 540"
        dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Body -->
    <g id="body">
      <ellipse cx="520" cy="500" rx="120" ry="75" fill="#38bdf8" stroke="#0f172a" stroke-width="5" />
      <!-- Belly -->
      <ellipse cx="530" cy="515" rx="70" ry="45" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" opacity="0.6" />
      <animateTransform attributeName="transform" type="scale"
        values="1 1;1.02 1.01;1 1"
        dur="3s" repeatCount="indefinite" />
    </g>

    <!-- Left wing (top) -->
    <g id="left-wing">
      <path d="M 480,470 Q 400,350 320,280 Q 380,360 440,440" fill="#334155" stroke="#0f172a" stroke-width="5" stroke-linejoin="round" />
      <path d="M 480,470 Q 430,380 370,310 Q 410,380 460,450" fill="#334155" stroke="#0f172a" stroke-width="4" opacity="0.7" />
      <!-- Wing feather details -->
      <line x1="440" y1="440" x2="380" y2="350" stroke="#0f172a" stroke-width="2" opacity="0.4" />
      <line x1="460" y1="450" x2="410" y2="370" stroke="#0f172a" stroke-width="2" opacity="0.4" />
      <animateTransform attributeName="transform" type="rotate"
        values="-20 480 470;15 480 470;-20 480 470"
        dur="0.8s" repeatCount="indefinite" />
    </g>

    <!-- Right wing (bottom) -->
    <g id="right-wing">
      <path d="M 520,530 Q 440,650 360,720 Q 420,640 480,560" fill="#334155" stroke="#0f172a" stroke-width="5" stroke-linejoin="round" />
      <path d="M 520,530 Q 470,620 410,690 Q 450,620 500,545" fill="#334155" stroke="#0f172a" stroke-width="4" opacity="0.7" />
      <!-- Wing feather details -->
      <line x1="480" y1="560" x2="420" y2="650" stroke="#0f172a" stroke-width="2" opacity="0.4" />
      <line x1="500" y1="545" x2="450" y2="630" stroke="#0f172a" stroke-width="2" opacity="0.4" />
      <animateTransform attributeName="transform" type="rotate"
        values="20 520 530;-15 520 530;20 520 530"
        dur="0.8s" repeatCount="indefinite" />
    </g>

    <!-- Head -->
    <g id="head">
      <circle cx="640" cy="440" r="55" fill="#38bdf8" stroke="#0f172a" stroke-width="5" />
      <!-- Eye -->
      <circle cx="662" cy="428" r="12" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" />
      <circle cx="665" cy="430" r="6" fill="#0f172a" />
      <circle cx="668" cy="427" r="2.5" fill="#f1f5f9" />
      <!-- Beak -->
      <polygon points="695,440 720,450 695,460" fill="#f59e0b" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />
      <!-- Beak line -->
      <line x1="695" y1="450" x2="718" y2="450" stroke="#0f172a" stroke-width="2" />
      <!-- Cheek -->
      <circle cx="650" cy="455" r="8" fill="#f9a8d4" opacity="0.4" />
      <!-- Head bob -->
      <animateTransform attributeName="transform" type="translate"
        values="0 0;3 -4;0 0"
        dur="0.8s" repeatCount="indefinite" />
    </g>

    <!-- Feet (tucked) -->
    <g id="feet">
      <path d="M 510,570 Q 520,590 515,610 Q 510,620 500,615" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
      <path d="M 540,570 Q 550,590 545,610 Q 540,620 530,615" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- Whole character subtle drift -->
    <animateTransform attributeName="transform" type="translate"
      values="0 0;8 -12;0 0"
      dur="4s" repeatCount="indefinite" />
  </g>
</svg>
