<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <g id="background">
    <!-- Sky -->
    <rect x="0" y="0" width="1000" height="650" fill="#38bdf8" />
    <!-- Sun -->
    <circle cx="850" cy="130" r="70" fill="#f1f5f9" opacity="0.9" />
    <!-- Ground -->
    <rect x="0" y="650" width="1000" height="350" fill="#4ade80" />
    <!-- Dirt path -->
    <ellipse cx="500" cy="850" rx="400" ry="60" fill="#a3845b" opacity="0.4" />
  </g>
  <g id="environment">
    <!-- Cloud 1 -->
    <g>
      <ellipse cx="200" cy="120" rx="80" ry="35" fill="#f1f5f9" />
      <ellipse cx="260" cy="110" rx="60" ry="30" fill="#f1f5f9" />
      <ellipse cx="150" cy="115" rx="55" ry="28" fill="#f1f5f9" />
    </g>
    <!-- Cloud 2 -->
    <g>
      <ellipse cx="600" cy="80" rx="70" ry="30" fill="#f1f5f9" />
      <ellipse cx="655" cy="72" rx="55" ry="25" fill="#f1f5f9" />
      <ellipse cx="550" cy="75" rx="50" ry="24" fill="#f1f5f9" />
    </g>
    <!-- Hills -->
    <ellipse cx="200" cy="650" rx="250" ry="80" fill="#34d399" />
    <ellipse cx="750" cy="650" rx="300" ry="70" fill="#34d399" />
  </g>
  <g id="structures">
    <!-- Barn body -->
    <rect x="80" y="400" width="220" height="250" rx="4" ry="4" fill="#dc2626" stroke="#0f172a" stroke-width="5" />
    <!-- Barn roof -->
    <polygon points="60,400 190,300 320,400" fill="#7f1d1d" stroke="#0f172a" stroke-width="5" />
    <!-- Barn door -->
    <rect x="150" y="530" width="80" height="120" rx="8" ry="8" fill="#334155" stroke="#0f172a" stroke-width="4" />
    <!-- Barn window -->
    <rect x="110" y="440" width="40" height="40" rx="4" ry="4" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" />
    <!-- Barn cross on window -->
    <line x1="130" y1="440" x2="130" y2="480" stroke="#0f172a" stroke-width="3" />
    <line x1="110" y1="460" x2="150" y2="460" stroke="#0f172a" stroke-width="3" />
    <!-- Fence -->
    <line x1="320" y1="620" x2="700" y2="620" stroke="#a3845b" stroke-width="6" />
    <line x1="320" y1="650" x2="700" y2="650" stroke="#a3845b" stroke-width="6" />
    <!-- Fence posts -->
    <rect x="318" y="600" width="10" height="80" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
    <rect x="418" y="600" width="10" height="80" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
    <rect x="518" y="600" width="10" height="80" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
    <rect x="618" y="600" width="10" height="80" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
    <rect x="693" y="600" width="10" height="80" fill="#a3845b" stroke="#0f172a" stroke-width="2" />
  </g>
  <g id="characters">
    <!-- Cow body -->
    <ellipse cx="550" cy="520" rx="110" ry="70" fill="#f1f5f9" stroke="#0f172a" stroke-width="5" />
    <!-- Cow spots -->
    <ellipse cx="510" cy="500" rx="25" ry="18" fill="#334155" />
    <ellipse cx="580" cy="530" rx="20" ry="15" fill="#334155" />
    <ellipse cx="545" cy="545" rx="15" ry="12" fill="#334155" />
    <!-- Cow legs -->
    <rect x="470" y="570" width="22" height="60" rx="6" ry="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <rect x="510" y="575" width="22" height="55" rx="6" ry="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <rect x="580" y="575" width="22" height="55" rx="6" ry="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <rect x="620" y="570" width="22" height="60" rx="6" ry="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="4" />
    <!-- Cow head -->
    <rect x="635" y="450" width="80" height="65" rx="20" ry="20" fill="#f1f5f9" stroke="#0f172a" stroke-width="5" />
    <!-- Cow snout -->
    <ellipse cx="695" cy="495" rx="25" ry="18" fill="#f5d0c5" stroke="#0f172a" stroke-width="3" />
    <!-- Cow nostrils -->
    <circle cx="688" cy="496" r="4" fill="#334155" />
    <circle cx="702" cy="496" r="4" fill="#334155" />
    <!-- Cow left eye -->
    <circle cx="658" cy="468" r="8" fill="#0f172a" />
    <circle cx="660" cy="466" r="3" fill="#f1f5f9" />
    <!-- Cow right eye -->
    <circle cx="690" cy="468" r="8" fill="#0f172a" />
    <circle cx="692" cy="466" r="3" fill="#f1f5f9" />
    <!-- Cow left ear -->
    <ellipse cx="638" cy="445" rx="18" ry="10" fill="#f5d0c5" stroke="#0f172a" stroke-width="3" transform="rotate(-30, 638, 445)" />
    <!-- Cow right ear -->
    <ellipse cx="712" cy="445" rx="18" ry="10" fill="#f5d0c5" stroke="#0f172a" stroke-width="3" transform="rotate(30, 712, 445)" />
    <!-- Cow left horn -->
    <polygon points="648,442 642,415 656,432" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" />
    <!-- Cow right horn -->
    <polygon points="702,442 708,415 694,432" fill="#f1f5f9" stroke="#0f172a" stroke-width="3" />
    <!-- Cow tail -->
    <path d="M 440,510 Q 410,490 405,460 Q 400,445 410,440" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
    <!-- Tail tuft -->
    <ellipse cx="410" cy="436" rx="8" ry="6" fill="#334155" />
  </g>
  <g id="foreground">
    <!-- Flowers -->
    <circle cx="750" cy="720" r="8" fill="#f472b6" />
    <circle cx="742" cy="712" r="5" fill="#f9a8d4" />
    <circle cx="758" cy="712" r="5" fill="#f9a8d4" />
    <circle cx="800" cy="740" r="7" fill="#38bdf8" />
    <circle cx="793" cy="733" r="4" fill="#7dd3fc" />
    <circle cx="807" cy="733" r="4" fill="#7dd3fc" />
    <circle cx="380" cy="710" r="8" fill="#f472b6" />
    <circle cx="372" cy="702" r="5" fill="#f9a8d4" />
    <circle cx="388" cy="702" r="5" fill="#f9a8d4" />
    <!-- Grass tufts -->
    <path d="M 860,690 Q 865,670 870,690" fill="none" stroke="#16a34a" stroke-width="3" />
    <path d="M 870,690 Q 877,665 882,690" fill="none" stroke="#16a34a" stroke-width="3" />
    <path d="M 130,700 Q 135,680 140,700" fill="none" stroke="#16a34a" stroke-width="3" />
    <path d="M 140,700 Q 147,675 152,700" fill="none" stroke="#16a34a" stroke-width="3" />
  </g>
</svg>
